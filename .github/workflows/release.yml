name: Release desktop packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        default: "v1.0.0"
      prerelease:
        description: "Mark release as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  windows:
    name: windows-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            python-architecture: x64
          - arch: arm64
            runner: windows-11-arm
            python-architecture: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: ${{ matrix.python-architecture }}
          cache: "pip"

      - name: Build Windows package
        shell: pwsh
        run: .\build_windows.ps1

      - name: Zip package
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\CRM条码查询\*" -DestinationPath "CRM条码查询-Windows-${{ matrix.arch }}.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CRM条码查询-Windows-${{ matrix.arch }}
          path: CRM条码查询-Windows-${{ matrix.arch }}.zip
          if-no-files-found: error

  macos:
    name: macos-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-26-intel
          - arch: arm64
            runner: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build macOS package
        run: |
          chmod +x ./build_macos.sh
          ./build_macos.sh

      - name: Zip package
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "CRM条码查询" "../CRM条码查询-macOS-${{ matrix.arch }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CRM条码查询-macOS-${{ matrix.arch }}
          path: CRM条码查询-macOS-${{ matrix.arch }}.zip
          if-no-files-found: error

  release:
    name: publish-release
    runs-on: ubuntu-latest
    needs:
      - windows
      - macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          notes="$(mktemp)"
          cat > "$notes" <<'EOF'
          桌面版下载：

          - Windows x64：适合大多数 Windows 电脑
          - Windows ARM64：适合 Windows on Arm 电脑
          - macOS x64：适合 Intel Mac
          - macOS ARM64：适合 Apple Silicon / M 系列 Mac

          下载对应压缩包后解压，运行里面的 CRM 条码查询程序。
          EOF

          args=()
          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file "$notes" "${args[@]}"
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file "$notes" "${args[@]}"
          fi

          gh release upload "$RELEASE_TAG" release-assets/*.zip --clobber
