name: Build Windows exe

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app.py"
      - "app_launcher.py"
      - "build_windows.ps1"
      - "requirements.txt"
      - "templates/**"
      - "config.example.json"
      - "config.docker.example.json"
      - ".github/workflows/windows-exe.yml"

permissions:
  contents: read

jobs:
  build:
    name: build-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            python-architecture: x64
          - arch: arm64
            runner: windows-11-arm
            python-architecture: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: ${{ matrix.python-architecture }}
          cache: "pip"

      - name: Build Windows package
        shell: pwsh
        run: .\build_windows.ps1

      - name: Zip package
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\CRM条码查询\*" -DestinationPath "CRM-barcode-query-Windows-${{ matrix.arch }}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CRM-barcode-query-Windows-${{ matrix.arch }}
          path: CRM-barcode-query-Windows-${{ matrix.arch }}.zip
          if-no-files-found: error
