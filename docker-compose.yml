services:
  crm-barcode-query:
    build: .
    image: crm-barcode-query:latest
    container_name: crm-barcode-query
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      CRM_QUERY_WORKERS: "2"
      CRM_TRANSFER_WORKERS: "2"
      CRM_DATA_DIR: /app/data
      CRM_SESSION_BASE: /app/session
      CRM_LEGACY_BARCODE_DIR: /app/legacy/barcode
      CRM_LEGACY_RESULTS_DIR: /app/legacy/results
    ports:
      - "5001:5001"
    volumes:
      # 默认已内置 CRM 入口；如需覆盖配置，可创建 config.json 后取消下一行注释
      # - ./config.json:/app/config.json:ro
      - crm_app_data:/app/data
      - crm_browser_session:/app/session
      # 兼容旧版本 bind mount 数据：首次启动会自动复制到 crm_app_data 命名卷
      - ./barcode:/app/legacy/barcode:ro
      - ./results:/app/legacy/results:ro
    shm_size: "1gb"

volumes:
  crm_app_data:
    name: crm_barcode_query_app_data
  crm_browser_session:
    name: crm_barcode_query_browser_session
