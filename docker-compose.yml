services:
  crm-barcode-query:
    build: .
    image: crm-barcode-query:latest
    container_name: crm-barcode-query
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      CRM_CLUSTER_ID: "${CRM_CLUSTER_ID:-crm-local}"
      CRM_NODE_ID: "${CRM_NODE_ID:-standalone-1}"
      CRM_NODE_NAME: "${CRM_NODE_NAME:-单机节点}"
      CRM_NODE_ROLE: "${CRM_NODE_ROLE:-standalone}"
      CRM_QUERY_WORKERS: "${CRM_QUERY_WORKERS:-2}"
      CRM_TRANSFER_WORKERS: "${CRM_TRANSFER_WORKERS:-2}"
      CRM_DATA_DIR: /app/data
      CRM_SESSION_BASE: /app/session
      CRM_DISABLE_DATA_MIGRATION: "1"
    ports:
      - "5001:5001"
    volumes:
      # 默认已内置 CRM 入口；如需覆盖配置，可创建 config.json 后取消下一行注释
      # - ./config.json:/app/config.json:ro
      - crm_app_data:/app/data
      - crm_browser_session:/app/session
    shm_size: "1gb"

volumes:
  crm_app_data:
    name: crm_barcode_query_app_data
  crm_browser_session:
    name: crm_barcode_query_browser_session
