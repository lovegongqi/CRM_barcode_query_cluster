services:
  crm-barcode-query:
    build: .
    image: crm-barcode-query:latest
    container_name: crm-barcode-query
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      # 默认已内置 CRM 入口；如需覆盖配置，可创建 config.json 后取消下一行注释
      # - ./config.json:/app/config.json:ro
      - ./barcode:/app/barcode
      - ./results:/app/results
      - ./session:/app/session
    shm_size: "1gb"
