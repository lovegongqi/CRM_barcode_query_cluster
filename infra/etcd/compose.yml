services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.21
    restart: unless-stopped
    env_file:
      - ../generated/${CRM_NODE_ID}/etcd.env
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - etcd_data:/etcd-data
      - ../generated/${CRM_NODE_ID}:/run/secrets:ro

volumes:
  etcd_data:
