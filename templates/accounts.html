<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号管理</title>
    <link rel="stylesheet" href="/static/log_modal.css">
    <script src="/static/log_modal.js"></script>
    <style>
        * { box-sizing: border-box; margin:0; padding:0; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#f4f7fb; color:#202938; min-height:100vh; }
        .container { max-width:1280px; margin:0 auto; padding:24px; }
        .header { display:flex; flex-direction:column; align-items:stretch; gap:12px; margin-bottom:20px; }
        h1 { font-size:26px; margin-bottom:6px; }
        .muted { color:#667085; font-size:13px; }
        .page-nav { display:flex; gap:6px; flex-wrap:nowrap; justify-content:flex-start; align-items:center; width:100%; }
        .page-nav a { flex:0 0 calc((100% - 24px)/5); width:calc((100% - 24px)/5); min-width:0; max-width:calc((100% - 24px)/5); display:inline-flex; align-items:center; justify-content:center; min-height:34px; padding:0 3px; font-size:11px; line-height:1; font-weight:800; color:#667085; text-decoration:none; border:1px solid #d9e1ec; border-radius:6px; background:#fff; white-space:nowrap; }
        .page-nav a.active { background:#2563eb; color:#fff; border-color:#2563eb; }
        .status-bar, .card { background:#fff; border:1px solid #d9e1ec; border-radius:8px; box-shadow:0 8px 24px rgba(15,23,42,.06); }
        .status-bar { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px 14px; margin-bottom:16px; }
        .status-text { font-size:13px; font-weight:800; color:#334155; }
        .dot { display:inline-block; width:9px; height:9px; border-radius:50%; background:#94a3b8; margin-right:6px; }
        .dot.green { background:#16a34a; } .dot.red { background:#dc2626; }
        .card { padding:18px; margin-bottom:16px; }
        .card h2 { font-size:16px; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid #e5e7eb; }
        label { display:block; font-size:12px; color:#667085; font-weight:700; margin-bottom:6px; }
        input { width:100%; border:1px solid #cfd8e3; border-radius:6px; padding:9px 10px; font-size:14px; outline:none; background:#fff; }
        input:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.12); }
        .form-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
        .permissions { display:flex; gap:10px; flex-wrap:wrap; margin:12px 0; }
        .permissions label { display:flex; align-items:center; gap:6px; color:#334155; font-size:13px; margin:0; }
        .permissions input { width:auto; }
        .channel-grid { display:grid; grid-template-columns:1fr 1fr auto; gap:12px; align-items:end; }
        .stepper { display:flex; gap:6px; align-items:center; }
        .stepper input { width:80px; height:36px; text-align:center; font-weight:800; }
        .stepper button { min-width:36px; min-height:36px; padding:0 10px; border:1px solid #cfd8e3; border-radius:6px; background:#fff; font-weight:900; cursor:pointer; }
        .bulk-login-grid { display:grid; grid-template-columns:1fr 1fr auto; gap:12px; align-items:end; }
        .bulk-captcha-row { display:grid; grid-template-columns:1fr auto; gap:12px; align-items:end; margin-top:12px; }
        .slot-status-list { display:flex; gap:8px; flex-wrap:wrap; margin:12px 0; }
        .slot-pill { display:inline-flex; align-items:center; gap:6px; padding:5px 8px; border:1px solid #d9e1ec; border-radius:999px; background:#f8fafc; color:#475569; font-size:12px; font-weight:800; }
        .slot-pill .dot { margin-right:0; }
        .log-box { background:#0f172a; color:#d4d4d4; border-radius:8px; padding:12px; font-family:"Courier New",monospace; font-size:12px; line-height:1.7; max-height:220px; overflow:auto; }
        .log-box .info { color:#4fc3f7; } .log-box .success { color:#81c784; } .log-box .error { color:#e57373; } .log-box .warn { color:#ffb74d; } .log-box .dim { color:#94a3b8; }
        .actions { display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; }
        .btn { min-height:38px; padding:8px 16px; border:none; border-radius:8px; font-weight:800; cursor:pointer; }
        .btn-primary { background:#2563eb; color:#fff; }
        .btn-secondary { background:#e5e7eb; color:#334155; }
        .btn-danger { background:#dc2626; color:#fff; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th, td { border-bottom:1px solid #e5e7eb; padding:8px 10px; text-align:left; vertical-align:top; }
        th { background:#f8fafc; color:#475569; }
        @media (max-width:860px) { .container { padding:14px; } .form-grid, .channel-grid, .bulk-login-grid, .bulk-captcha-row { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>账号管理</h1>
            <p class="muted">管理员维护账号和页面权限。默认管理员：admin / 88293529。</p>
        </div>
        <div class="page-nav">
            {% for link in nav_links %}
            <a href="{{ link.href }}" class="{{ 'active' if link.href == '/accounts' else '' }}">{{ link.label }}</a>
            {% endfor %}
        </div>
    </div>

    <div class="card">
        <h2>当前工具账号</h2>
        <div class="status-text">当前工具账号：<span id="accountStatus">检测中</span></div>
        <div class="actions" style="margin-top:12px;">
            <a class="btn btn-secondary" href="/logout" style="text-decoration:none;display:inline-flex;align-items:center;">退出登录</a>
        </div>
    </div>

    <div class="card" id="passwordCard" style="display:none">
        <h2>修改自己的密码</h2>
        <div class="form-grid">
            <div><label>原密码</label><input id="oldPassword" type="password"></div>
            <div><label>新密码</label><input id="newPassword" type="password"></div>
            <div style="display:flex;align-items:end;"><button class="btn btn-primary" onclick="changePassword()">修改密码</button></div>
        </div>
    </div>

    <div class="card" id="runtimeConfigCard" style="display:none">
        <h2>系统配置</h2>
        <div class="channel-grid">
            <div>
                <label>查询通道数量</label>
                <div class="stepper">
                    <button type="button" onclick="changeWorkerCount('queryWorkerCount', -1)">-</button>
                    <input id="queryWorkerCount" type="number" min="1" max="10" value="2">
                    <button type="button" onclick="changeWorkerCount('queryWorkerCount', 1)">+</button>
                </div>
            </div>
            <div>
                <label>移库通道数量</label>
                <div class="stepper">
                    <button type="button" onclick="changeWorkerCount('transferWorkerCount', -1)">-</button>
                    <input id="transferWorkerCount" type="number" min="1" max="10" value="2">
                    <button type="button" onclick="changeWorkerCount('transferWorkerCount', 1)">+</button>
                </div>
            </div>
            <button class="btn btn-primary" onclick="saveRuntimeConfig()">保存配置</button>
        </div>
        <div class="form-grid" style="margin-top:12px;">
            <div><label>本公司经销商名称</label><input id="ownDealerName" placeholder="例如：江西省天麓工贸有限公司"></div>
            <div><label>冻结仓库名称</label><input id="frozenWarehouseName" placeholder="例如：江西天麓冻结仓库"></div>
            <label style="display:flex;align-items:center;gap:8px;margin-top:24px;"><input id="frozenWarehouseSaveOnly" type="checkbox"> 冻结仓库只保存不确认</label>
        </div>
    </div>

    <div class="card" id="bulkCrmLoginCard" style="display:none">
        <h2>CRM 所有通道批量登录</h2>
        <div class="bulk-login-grid">
            <div><label>CRM 账号</label><input id="bulkCrmUsername" placeholder="CRM 用户名"></div>
            <div><label>CRM 密码</label><input id="bulkCrmPassword" type="password" placeholder="CRM 密码"></div>
            <button class="btn btn-primary" id="bulkCrmLoginBtn" onclick="startBulkCrmLogin()">批量登录</button>
        </div>
        <div class="bulk-captcha-row" id="bulkCaptchaRow" style="display:none">
            <div><label>短信验证码</label><input id="bulkCrmCaptcha" placeholder="输入一次验证码，同步提交到所有通道" maxlength="6"></div>
            <button class="btn btn-primary" id="bulkCaptchaBtn" onclick="submitBulkCrmCaptcha()">提交验证码</button>
        </div>
        <div class="slot-status-list" id="bulkCrmSlotStatus"></div>
        <div class="log-box" id="bulkCrmLoginLog"><div class="dim">等待操作...</div></div>
    </div>

    <div class="card" id="accountEditCard" style="display:none">
        <h2>账号设置</h2>
        <input type="hidden" id="accountId">
        <div class="form-grid">
            <div><label>账号</label><input id="username" placeholder="登录账号"></div>
            <div><label>显示名称</label><input id="displayName" placeholder="可选"></div>
            <div><label>密码</label><input id="password" type="password" placeholder="新增必填，编辑留空不改"></div>
        </div>
        <div class="permissions">
            <label><input type="checkbox" value="crm"> 在线查询</label>
            <label><input type="checkbox" value="results"> 结果管理</label>
            <label><input type="checkbox" value="transfer"> 移库</label>
            <label><input type="checkbox" value="accounts"> 账号管理</label>
            <label><input type="checkbox" value="product-library"> 条码匹配</label>
        </div>
        <div class="actions">
            <button class="btn btn-secondary" onclick="resetForm()">清空</button>
            <button class="btn btn-primary" onclick="saveAccount()">保存账号</button>
        </div>
    </div>

    <div class="card" id="accountListCard" style="display:none">
        <h2>账号列表</h2>
        <div id="accountsBox"></div>
    </div>
</div>

<script>
function escapeHtml(text) {
    return String(text || '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

function selectedPermissions() {
    return Array.from(document.querySelectorAll('.permissions input:checked')).map(el => el.value);
}

function setPermissions(values) {
    document.querySelectorAll('.permissions input').forEach(el => el.checked = values.includes(el.value));
}

function resetForm() {
    document.getElementById('accountId').value = '';
    document.getElementById('username').value = '';
    document.getElementById('displayName').value = '';
    document.getElementById('password').value = '';
    setPermissions([]);
}

let bulkCrmSlots = [];
let pendingBulkCrmSlots = [];
let currentBulkCrmLoginJobId = sessionStorage.getItem('crm_bulk_login_job_all') || '';
let bulkLoginPollTimer = null;
let lastBulkLoginLogSeq = 0;

function bulkLog(message, level='dim') {
    const box = document.getElementById('bulkCrmLoginLog');
    if (!box) return;
    if (box.querySelector('.dim') && box.textContent.trim() === '等待操作...') box.innerHTML = '';
    const line = document.createElement('div');
    line.className = level;
    line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
    if (window.globalLogAppend) window.globalLogAppend(message, level);
}

function renderBulkCrmSlots() {
    const box = document.getElementById('bulkCrmSlotStatus');
    if (!box) return;
    if (!bulkCrmSlots.length) {
        box.innerHTML = '<span class="slot-pill">暂无通道</span>';
        return;
    }
    box.innerHTML = bulkCrmSlots.map(slot => {
        const logged = !!slot.logged_in;
        const dot = logged ? 'green' : 'red';
        const text = logged ? '已登录' : (slot.browser_running ? '未登录' : '未启动');
        return `<span class="slot-pill"><span class="dot ${dot}"></span>${escapeHtml(slot.label)} ${escapeHtml(text)}</span>`;
    }).join('');
}

async function loadBulkCrmSlots() {
    const data = await fetch('/api/crm/slots').then(res => res.json()).catch(() => null);
    if (!data || !data.success) {
        bulkCrmSlots = [];
        renderBulkCrmSlots();
        return;
    }
    bulkCrmSlots = [...(data.query || []), ...(data.transfer || [])];
    renderBulkCrmSlots();
}

function slotLoginPayload(slot, extra={}) {
    return Object.assign({kind: slot.kind, slot_id: slot.id}, extra);
}

function isLoggedInMessage(message) {
    return ['已登录（会话有效）', '登录成功', '登录成功（页面已跳转）'].includes(message || '');
}

async function startBulkCrmLogin() {
    const username = document.getElementById('bulkCrmUsername').value.trim();
    const password = document.getElementById('bulkCrmPassword').value;
    if (!username || !password) return alert('请输入 CRM 账号和密码');
    const btn = document.getElementById('bulkCrmLoginBtn');
    btn.disabled = true;
    btn.textContent = '登录中...';
    pendingBulkCrmSlots = [];
    document.getElementById('bulkCaptchaRow').style.display = 'none';
    document.getElementById('bulkCrmLoginLog').innerHTML = '';
    localStorage.setItem('crm_username', username);
    lastBulkLoginLogSeq = 0;
    try {
        const data = await fetch('/api/crm/bulk-login/start', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({scope: 'all', username, password})
        }).then(res => res.json());
        if (!data.success) {
            bulkLog(data.error || '批量登录启动失败', 'error');
            btn.disabled = false;
            btn.textContent = '批量登录';
            return;
        }
        renderBulkLoginJob(data);
        startBulkLoginPolling();
    } catch (e) {
        bulkLog('批量登录启动出错：' + e, 'error');
        btn.disabled = false;
        btn.textContent = '批量登录';
    } finally {
        await loadBulkCrmSlots();
    }
}

async function submitBulkCrmCaptcha() {
    const captcha = document.getElementById('bulkCrmCaptcha').value.trim();
    if (!captcha) return alert('请输入验证码');
    if (!currentBulkCrmLoginJobId && !pendingBulkCrmSlots.length) return alert('没有等待验证码的通道');
    const btn = document.getElementById('bulkCaptchaBtn');
    btn.disabled = true;
    btn.textContent = '提交中...';
    try {
        bulkLog('开始同步提交验证码到等待中的通道', 'info');
        const data = await fetch('/api/crm/bulk-login/captcha', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({scope: 'all', job_id: currentBulkCrmLoginJobId, captcha})
        }).then(res => res.json());
        if (!data.success) {
            bulkLog(data.error || '提交验证码失败', 'error');
        } else {
            renderBulkLoginJob(data);
            startBulkLoginPolling();
        }
    } finally {
        btn.disabled = false;
        btn.textContent = '提交验证码';
        await loadBulkCrmSlots();
    }
}

function appendBulkLoginServerLog(entry) {
    if (!entry || Number(entry.id || 0) <= lastBulkLoginLogSeq) return;
    bulkLog(entry.message || '', entry.level || 'dim');
    lastBulkLoginLogSeq = Math.max(lastBulkLoginLogSeq, Number(entry.id || 0));
}

function renderBulkLoginJob(data) {
    if (!data || !data.success) return;
    currentBulkCrmLoginJobId = data.job_id || currentBulkCrmLoginJobId;
    if (currentBulkCrmLoginJobId) sessionStorage.setItem('crm_bulk_login_job_all', currentBulkCrmLoginJobId);
    (data.logs || []).forEach(appendBulkLoginServerLog);
    pendingBulkCrmSlots = data.pending_slots || [];
    document.getElementById('bulkCrmLoginBtn').disabled = !!data.running;
    document.getElementById('bulkCrmLoginBtn').textContent = data.running ? '登录中...' : '批量登录';
    if (data.waiting_captcha) {
        document.getElementById('bulkCaptchaRow').style.display = '';
        if (!data.captcha_received) {
            document.getElementById('bulkCaptchaBtn').disabled = false;
            document.getElementById('bulkCaptchaBtn').textContent = '提交验证码';
        }
        const input = document.getElementById('bulkCrmCaptcha');
        if (!input.value) input.focus();
    }
    if (data.done) {
        if (bulkLoginPollTimer) clearInterval(bulkLoginPollTimer);
        bulkLoginPollTimer = null;
        document.getElementById('bulkCrmLoginBtn').disabled = false;
        document.getElementById('bulkCrmLoginBtn').textContent = '批量登录';
        if (data.login_success) {
            document.getElementById('bulkCaptchaRow').style.display = 'none';
            document.getElementById('bulkCrmCaptcha').value = '';
            currentBulkCrmLoginJobId = '';
            sessionStorage.removeItem('crm_bulk_login_job_all');
        }
        loadBulkCrmSlots();
    }
}

async function pollBulkLoginJob() {
    if (!currentBulkCrmLoginJobId) return;
    const params = new URLSearchParams({scope: 'all', job_id: currentBulkCrmLoginJobId});
    const data = await fetch('/api/crm/bulk-login/status?' + params.toString()).then(res => res.json()).catch(() => null);
    if (data && data.success) renderBulkLoginJob(data);
}

function startBulkLoginPolling() {
    if (bulkLoginPollTimer) clearInterval(bulkLoginPollTimer);
    bulkLoginPollTimer = setInterval(pollBulkLoginJob, 1000);
    pollBulkLoginJob();
}

function changeWorkerCount(inputId, delta) {
    const input = document.getElementById(inputId);
    let value = Number.parseInt(input.value, 10);
    if (Number.isNaN(value)) value = 2;
    input.value = Math.max(1, Math.min(10, value + delta));
}

async function loadRuntimeConfig() {
    const data = await fetch('/api/runtime-config').then(res => res.json()).catch(() => null);
    if (!data || !data.success || !data.can_edit) {
        document.getElementById('runtimeConfigCard').style.display = 'none';
        return;
    }
    const config = data.config || {};
    document.getElementById('runtimeConfigCard').style.display = '';
    document.getElementById('queryWorkerCount').value = config.query_workers || 2;
    document.getElementById('transferWorkerCount').value = config.transfer_workers || 2;
    document.getElementById('ownDealerName').value = config.own_dealer_name || '';
    document.getElementById('frozenWarehouseName').value = config.frozen_warehouse_name || '';
    document.getElementById('frozenWarehouseSaveOnly').checked = config.frozen_warehouse_save_only !== false;
}

async function saveRuntimeConfig() {
    const queryWorkers = Number.parseInt(document.getElementById('queryWorkerCount').value, 10);
    const transferWorkers = Number.parseInt(document.getElementById('transferWorkerCount').value, 10);
    const ownDealerName = document.getElementById('ownDealerName').value.trim();
    const frozenWarehouseName = document.getElementById('frozenWarehouseName').value.trim();
    const frozenWarehouseSaveOnly = document.getElementById('frozenWarehouseSaveOnly').checked;
    const data = await fetch('/api/runtime-config', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            query_workers: queryWorkers,
            transfer_workers: transferWorkers,
            own_dealer_name: ownDealerName,
            frozen_warehouse_name: frozenWarehouseName,
            frozen_warehouse_save_only: frozenWarehouseSaveOnly,
        })
    }).then(res => res.json()).catch(() => null);
    if (!data || !data.success) return alert((data && data.error) || '保存失败');
    const config = data.config || {};
    document.getElementById('queryWorkerCount').value = config.query_workers || queryWorkers;
    document.getElementById('transferWorkerCount').value = config.transfer_workers || transferWorkers;
    document.getElementById('ownDealerName').value = config.own_dealer_name || ownDealerName;
    document.getElementById('frozenWarehouseName').value = config.frozen_warehouse_name || frozenWarehouseName;
    document.getElementById('frozenWarehouseSaveOnly').checked = config.frozen_warehouse_save_only !== false;
    loadBulkCrmSlots();
    alert('系统配置已更新');
}

async function loadAccounts() {
    const data = await fetch('/api/accounts').then(res => res.json());
    const account = data.account || null;
    document.getElementById('accountStatus').textContent = account ? `${account.username}${account.is_admin ? '（管理员）' : ''}` : '未登录';
    document.getElementById('passwordCard').style.display = account ? '' : 'none';
    const canManage = !!(account && account.is_admin);
    document.getElementById('accountEditCard').style.display = canManage ? '' : 'none';
    document.getElementById('accountListCard').style.display = canManage ? '' : 'none';
    document.getElementById('runtimeConfigCard').style.display = canManage ? '' : 'none';
    document.getElementById('bulkCrmLoginCard').style.display = canManage ? '' : 'none';
    if (canManage) {
        loadRuntimeConfig();
        loadBulkCrmSlots();
        document.getElementById('bulkCrmUsername').value = localStorage.getItem('crm_username') || '';
        if (currentBulkCrmLoginJobId) startBulkLoginPolling();
    }
    if (!data.success) {
        document.getElementById('accountsBox').innerHTML = `<div class="status-text">${escapeHtml(data.error || '请先以管理员登录')}</div>`;
        return;
    }
    const rows = data.accounts || [];
    document.getElementById('accountsBox').innerHTML = `
        <table>
            <thead><tr><th>账号</th><th>显示名称</th><th>权限页面</th><th>更新</th><th></th></tr></thead>
            <tbody>${rows.map(row => `
                <tr>
                    <td>${escapeHtml(row.username)}</td>
                    <td>${escapeHtml(row.display_name || '')}</td>
                    <td>${escapeHtml((row.permissions || []).join('，'))}</td>
                    <td>${escapeHtml(row.updated_at || '')}</td>
                    <td>
                        <button class="btn btn-secondary" onclick='editAccount(${JSON.stringify(row)})'>编辑</button>
                        <button class="btn btn-danger" onclick="deleteAccount('${escapeHtml(row.id)}')">删除</button>
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="5">暂无账号</td></tr>'}</tbody>
        </table>`;
}

function editAccount(row) {
    document.getElementById('accountId').value = row.id || '';
    document.getElementById('username').value = row.username || '';
    document.getElementById('displayName').value = row.display_name || '';
    document.getElementById('password').value = '';
    setPermissions(row.permissions || []);
}

async function saveAccount() {
    const payload = {
        id: document.getElementById('accountId').value.trim(),
        username: document.getElementById('username').value.trim(),
        display_name: document.getElementById('displayName').value.trim(),
        password: document.getElementById('password').value,
        permissions: selectedPermissions()
    };
    const data = await fetch('/api/accounts', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(payload)
    }).then(res => res.json());
    if (!data.success) return alert(data.error || '保存失败');
    resetForm();
    loadAccounts();
}

async function deleteAccount(id) {
    if (!confirm('确定删除这个账号？')) return;
    const data = await fetch('/api/accounts/' + encodeURIComponent(id), {method:'DELETE'}).then(res => res.json());
    if (!data.success) return alert(data.error || '删除失败');
    loadAccounts();
}

async function changePassword() {
    const data = await fetch('/api/app-auth/password', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            old_password: document.getElementById('oldPassword').value,
            new_password: document.getElementById('newPassword').value
        })
    }).then(res => res.json());
    if (!data.success) return alert(data.error || '修改失败');
    document.getElementById('oldPassword').value = '';
    document.getElementById('newPassword').value = '';
    alert('密码已修改');
}

loadAccounts();
</script>
</body>
</html>
