<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM 条码查询</title>
    <link rel="stylesheet" href="/static/log_modal.css">
    <script src="/static/log_modal.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(180deg,#eaf1fb 0,#f7f9fc 320px,#f7f9fc 100%); color: #202938; min-height: 100vh; }
        .container { max-width: 1280px; margin: 0 auto; padding: 24px; }
        .header { display:flex; flex-direction:column; align-items:stretch; gap:12px; margin-bottom:20px; }
        .header h1 { font-size: 26px; color: #202938; margin-bottom: 6px; }
        .header p { color: #667085; font-size: 13px; }
        .page-nav { display:flex; gap:6px; flex-wrap:nowrap; justify-content:flex-start; align-items:center; width:100%; }
        .page-nav a { flex:0 0 calc((100% - 24px)/5); width:calc((100% - 24px)/5); min-width:0; max-width:calc((100% - 24px)/5); display:inline-flex; align-items:center; justify-content:center; min-height:34px; padding:0 3px; font-size:11px; line-height:1; font-weight:800; color:#667085; text-decoration:none; border:1px solid #d9e1ec; border-radius:6px; background:#fff; white-space:nowrap; }
        .page-nav a.active { background:#2563eb; color:#fff; border-color:#2563eb; }
        .page-nav a:hover { border-color:#bfdbfe; color:#2563eb; }
        .page-nav a.active:hover { color:#fff; }
        .status-bar { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; padding: 12px 16px; background: #fff; border-radius: 8px; border: 1px solid #e0e0e0; box-shadow: 0 6px 18px rgba(15,23,42,.06); }
        .status-item { display: flex; align-items: center; gap: 8px; font-size: 14px; color:#334155; font-weight:700; }
        .status-actions { margin-left:auto; display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
        .status-bar .progress-bar { flex-basis:100%; width:100%; margin-top:2px; }
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; flex: 0 0 10px; box-shadow: 0 0 0 3px rgba(148,163,184,.16); }
        .status-dot.green { background: #28a745; }
        .status-dot.red { background: #dc3545; }
        .status-dot.gray { background: #999; }
        .card { background: rgba(255,255,255,.96); border-radius: 8px; padding: 24px; border: 1px solid #d9e1ec; margin-bottom: 20px; box-shadow: 0 10px 28px rgba(15,23,42,.08); }
        .card h2 { font-size: 16px; color: #333; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .card-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:16px; padding-bottom:10px; border-bottom:1px solid #eee; }
        .card-head h2 { margin:0; padding:0; border:0; }
        .crm-actions { display:flex; align-items:center; gap:8px; flex:0 0 auto; }
        .crm-actions .btn { min-height:34px; padding:6px 12px; font-size:12px; white-space:nowrap; }
        .form-row { display: flex; gap: 12px; align-items: flex-end; margin-bottom: 16px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 13px; color: #666; font-weight: 500; }
        .form-group input { padding: 8px 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; outline: none; }
        .form-group input:focus { border-color: #4472C4; }
        .query-actions { align-items: flex-end; }
        .retry-group { width: 150px; }
        .retry-group input { height: 38px; }
        .btn { min-height: 38px; padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 800; border: none; transition: all 0.2s; box-shadow: 0 1px 2px rgba(15,23,42,.08); }
        .btn-primary { background: #2563eb; color: #fff; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-primary:disabled { background: #ccc; }
        .btn-danger { background: #dc3545; color: #fff; }
        .btn-danger:hover { background: #c82333; }
        .btn-success { background: #2563eb; color: #fff; }
        .btn-success:hover { background: #1d4ed8; }
        .btn-secondary { background: #6c757d; color: #fff; }
        .btn-secondary:hover { background: #5a6268; }
        textarea { width: 100%; height: 120px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 13px; font-family: monospace; resize: vertical; outline: none; }
        textarea:focus { border-color: #4472C4; }
        .log-area { background: #0f172a; color: #d4d4d4; border-radius: 8px; padding: 14px; font-family: 'Courier New', monospace; font-size: 13px; max-height: 400px; overflow-y: auto; line-height: 1.8; }
        .log-area .info { color: #4fc3f7; }
        .log-area .success { color: #81c784; }
        .log-area .error { color: #e57373; }
        .log-area .warn { color: #ffb74d; }
        .log-area .dim { color: #888; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 24px; border-radius: 6px; font-size: 14px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        .hint { font-size: 12px; color: #999; margin-top: 4px; }
        .progress-bar { height: 4px; background: #e0e0e0; border-radius: 2px; margin-top: 8px; overflow: hidden; display: none; }
        .progress-bar.show { display: block; }
        .progress-bar .bar { height: 100%; background: #4472C4; transition: width 0.3s; width: 0%; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
        .auth-card { display:flex; align-items:center; justify-content:space-between; gap:16px; }
        .auth-card p { color:#667085; font-size:13px; margin-top:6px; }
        .auth-actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
        .modal-overlay {
            position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
            background: rgba(15,23,42,.52); z-index: 1000; padding: 18px;
        }
        .modal-overlay.show { display: flex; }
        .login-modal {
            width: min(460px, 100%);
            background: #fff;
            border: 1px solid #d9e1ec;
            border-radius: 10px;
            box-shadow: 0 28px 70px rgba(15,23,42,.30);
            overflow: hidden;
        }
        .login-modal-head {
            display:flex; align-items:center; justify-content:space-between; gap:12px;
            padding: 18px 20px; border-bottom: 1px solid #e5eaf2; background:#f8fbff;
        }
        .login-modal-head h3 { font-size: 17px; color:#202938; }
        .modal-close { border:none; background:transparent; color:#667085; font-size:22px; line-height:1; }
        .login-modal-body { padding: 18px 20px 20px; }
        .login-modal-body .form-row { flex-direction: column; align-items: stretch; gap: 12px; }
        .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 760px) {
            .container { padding: 14px; }
            .form-row { align-items: stretch; flex-direction: column; }
            .form-group { width: 100%; }
            .status-bar { align-items: center; flex-direction: row; flex-wrap: wrap; }
            .status-actions { margin-left:auto; justify-content:flex-end; }
            .card-head { align-items:center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>CRM 在线查询</h1>
                <p>负责 CRM 登录和批量查询；切换页面不会中断后台任务。</p>
            </div>
            <div class="page-nav">
                {% for link in nav_links %}
                <a href="{{ link.href }}" class="{{ 'active' if link.href == '/crm' else '' }}">{{ link.label }}</a>
                {% endfor %}
            </div>
        </div>

        <div class="status-bar" id="statusBar">
            <div class="status-item">
                <span class="status-dot gray" id="browserDot"></span>
                <span id="browserStatus">浏览器</span>
            </div>
            <div class="status-item">
                <span class="status-dot gray" id="loginDot"></span>
                <span>CRM：</span><span id="loginStatus">未登录</span>
            </div>
            <div class="status-item">
                <span>工具账号：</span><span id="appAccountStatus">检测中</span>
                <a href="/logout">退出</a>
            </div>
            <div class="progress-bar" id="loginProgress">
                <div class="bar" id="loginProgressBar"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-head">
                <h2>查询条码</h2>
                <div class="crm-actions">
                    <button class="btn btn-primary" id="loginBtn" onclick="openLoginModal()">批量登录 CRM</button>
                    <button class="btn btn-danger" id="logoutBtn" onclick="doLogout()" style="display:none">退出登录</button>
                </div>
            </div>
            <div class="form-group">
                <label>条码查询（可一行一个，也可用逗号、空格分隔）</label>
                <textarea id="batchInput" oninput="saveQueryInput()" inputmode="latin" lang="en" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="ime-mode:inactive" placeholder="6923445601003
6923445601004,6923445601005
6923445601006 6923445601007"></textarea>
            </div>
            <div class="form-row query-actions">
                <button class="btn btn-success" id="batchQueryBtn" onclick="doBatchQuery()">开始查询</button>
                <button class="btn btn-danger" id="stopBatchBtn" onclick="stopBatch()" style="display:none">停止当前查询</button>
                <button class="btn btn-secondary" type="button" onclick="clearQueryInput()">清空输入框</button>
                <div class="form-group retry-group">
                    <label>失败重试上限</label>
                    <input type="number" id="retryLimitInput" min="0" max="5" value="5">
                </div>
            </div>
            <div class="progress-bar" id="queryProgress">
                <div class="bar" id="queryProgressBar"></div>
            </div>
        </div>

        <div class="card">
            <h2>操作日志</h2>
            <div class="log-area" id="logArea">
                <div class="dim">等待操作...</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="modal-overlay" id="loginModal" onclick="if(event.target.id==='loginModal')cancelLogin()">
        <div class="login-modal">
            <div class="login-modal-head">
                <h3>登录 CRM</h3>
                <button class="modal-close" onclick="cancelLogin()">×</button>
            </div>
            <div class="login-modal-body">
                <div class="form-row">
                    <div class="form-group">
                        <label>账号</label>
                        <input type="text" id="loginUsername" placeholder="CRM 用户名">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="loginPassword" placeholder="密码">
                    </div>
                </div>
                <div class="form-row" id="captchaRow" style="display:none">
                    <div class="form-group" style="flex:1">
                        <label>短信验证码</label>
                        <input type="text" id="captchaInput" placeholder="输入收到短信验证码" maxlength="6">
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" onclick="cancelLogin()">取消</button>
                    <button class="btn btn-primary" id="modalLoginBtn" onclick="doLogin()">批量登录</button>
                    <button class="btn btn-primary" id="captchaSubmitBtn" onclick="doLoginStep2()" style="display:none">提交验证码</button>
                    <button class="btn btn-secondary" id="resetLoginBtn" onclick="restartLogin()" style="display:none">重新登录</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let queryQueue = [];
        let isBatchRunning = false;
        let batchStartPending = false;
        let queryCount = 0;
        let lastBatchLogSeq = 0;
        let currentQuerySlot = localStorage.getItem('crm_query_slot') || 'query-1';
        let querySlots = [];
        let isMultiBatchRunning = false;
        let multiBatchJobs = {};
        let multiBatchPollTimer = null;
        let isMultiBatchPolling = false;
        let pendingLoginSlots = [];

        function slotPayload(extra={}) {
            return Object.assign({slot_id: currentQuerySlot, kind: 'query'}, extra);
        }

        function slotLoginPayload(slot, extra={}) {
            return Object.assign({slot_id: slot.id, kind: slot.kind || 'query'}, extra);
        }

        function isLoggedInMessage(message) {
            return ['已登录（会话有效）', '登录成功', '登录成功（页面已跳转）'].includes(message || '');
        }

        async function loadSlots() {
            const data = await fetch('/api/crm/slots').then(r => r.json()).catch(() => null);
            if (!data || !data.success) return;
            querySlots = data.query || [];
            const previousSlot = currentQuerySlot;
            if (!querySlots.some(slot => slot.id === currentQuerySlot)) {
                currentQuerySlot = (data.defaults && data.defaults.query) || (querySlots[0] && querySlots[0].id) || 'query-1';
                localStorage.setItem('crm_query_slot', currentQuerySlot);
            }
            if (currentQuerySlot !== previousSlot) restoreQueryInput();
        }

        function queryInputStorageKey(slotId=currentQuerySlot) {
            return `crm_query_input_${slotId}`;
        }

        function saveQueryInput() {
            sessionStorage.setItem(queryInputStorageKey(), document.getElementById('batchInput').value);
        }

        function restoreQueryInput() {
            let savedBarcodeText = sessionStorage.getItem(queryInputStorageKey());
            const legacyText = sessionStorage.getItem('crm_query_input');
            if (!savedBarcodeText && legacyText) {
                savedBarcodeText = legacyText;
                sessionStorage.setItem(queryInputStorageKey(), legacyText);
                sessionStorage.removeItem('crm_query_input');
            }
            document.getElementById('batchInput').value = savedBarcodeText || '';
        }

        function log(msg, type='') {
            const area = document.getElementById('logArea');
            const line = document.createElement('div');
            line.className = type;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            area.appendChild(line);
            area.scrollTop = area.scrollHeight;
            if (window.globalLogAppend) window.globalLogAppend(msg, type || 'dim');
        }

        function appendServerLog(entry) {
            const area = document.getElementById('logArea');
            const line = document.createElement('div');
            line.className = entry.level || '';
            line.textContent = `[${entry.time}] ${entry.message}`;
            area.appendChild(line);
            if (window.globalLogAppend) window.globalLogAppend(entry.message || '', entry.level || 'dim', entry.time || '');
            lastBatchLogSeq = Math.max(lastBatchLogSeq, Number(entry.id || 0));
            while (area.children.length > 5000) {
                area.removeChild(area.firstChild);
            }
            area.scrollTop = area.scrollHeight;
        }

        function escapeHtml(text) {
            return String(text || '').replace(/[&<>"']/g, ch => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[ch]));
        }

        function rememberQueryNotice(message) {
            if (!multiBatchJobs) return;
            if (!Array.isArray(multiBatchJobs.notices)) multiBatchJobs.notices = [];
            multiBatchJobs.notices.push(message);
            multiBatchJobs.notices = multiBatchJobs.notices.slice(-5);
        }

        function rememberFailedBarcode(barcode) {
            if (!barcode || !multiBatchJobs) return;
            if (!Array.isArray(multiBatchJobs.failedBarcodes)) multiBatchJobs.failedBarcodes = [];
            if (!multiBatchJobs.failedBarcodes.includes(barcode)) {
                multiBatchJobs.failedBarcodes.push(barcode);
            }
        }

        function formatDuration(seconds) {
            seconds = Math.max(0, Math.floor(Number(seconds) || 0));
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            if (hours) return `${hours}小时${minutes}分${secs}秒`;
            if (minutes) return `${minutes}分${secs}秒`;
            return `${secs}秒`;
        }

        function renderQuerySummary(statusText='查询中') {
            const area = document.getElementById('logArea');
            if (!area || !multiBatchJobs || !multiBatchJobs.total) return;
            const rows = multiSlotRows();
            const runningBarcodes = rows
                .filter(row => row.running && row.barcode)
                .map(row => {
                    const startedAt = Number(row.startedAt || 0);
                    const elapsed = startedAt ? Math.max(0, Math.floor((Date.now() - startedAt) / 1000)) : 0;
                    return `${row.barcode}（${elapsed}秒）`;
                });
            const total = multiBatchJobs.total || 0;
            const completed = multiBatchJobs.completed || 0;
            const success = multiBatchJobs.successCount || 0;
            const failed = multiBatchJobs.failedCount || 0;
            const pending = Math.max(0, (multiBatchJobs.pending || []).length);
            const failedBarcodes = Array.from(new Set(multiBatchJobs.failedBarcodes || []));
            const notices = (multiBatchJobs.notices || []).slice(-3);
            const startedMs = Number(multiBatchJobs.startedAtMs || 0) || Date.parse(multiBatchJobs.started_at || '');
            const elapsedText = Number.isFinite(startedMs) && startedMs > 0
                ? formatDuration((Date.now() - startedMs) / 1000)
                : '';
            const elapsedLabel = ['查询完成', '查询已停止'].includes(statusText) ? '总耗时' : '已耗时';
            const runningText = runningBarcodes.length
                ? `正在查询 ${runningBarcodes.length} 个：${runningBarcodes.map(escapeHtml).join('，')}`
                : (pending ? '等待空闲通道领取条码' : '没有正在查询的条码');
            area.innerHTML = `
                <div class="info">[${new Date().toLocaleTimeString()}] ${escapeHtml(statusText)}</div>
                <div>总条码数：${total}</div>
                <div>已完成：${completed}/${total}　成功：${success}　失败：${failed}　待查询：${pending}</div>
                ${elapsedText ? `<div>${elapsedLabel}：${escapeHtml(elapsedText)}</div>` : ''}
                <div class="dim">${runningText}</div>
                ${runningBarcodes.length ? '<div class="dim">同一条码等待时间变长，通常是在等 CRM 报表返回；失败后会按重试上限继续查。</div>' : ''}
                ${failedBarcodes.length ? `<div class="error">失败条码：${failedBarcodes.map(escapeHtml).join('，')}</div>` : '<div class="dim">失败条码：无</div>'}
                ${notices.map(msg => `<div class="warn">${escapeHtml(msg)}</div>`).join('')}
            `;
            area.scrollTop = area.scrollHeight;
        }

        function setQueryButtonsRunning(runningText='查询中...', stopText='停止查询') {
            document.getElementById('batchQueryBtn').disabled = true;
            document.getElementById('batchQueryBtn').innerHTML = `<span class="spinner"></span> ${runningText}`;
            document.getElementById('retryLimitInput').disabled = true;
            document.getElementById('stopBatchBtn').textContent = stopText;
            document.getElementById('stopBatchBtn').style.display = '';
            document.getElementById('queryProgress').classList.add('show');
        }

        function resetQueryButtons() {
            document.getElementById('batchQueryBtn').disabled = false;
            document.getElementById('batchQueryBtn').textContent = '开始查询';
            document.getElementById('stopBatchBtn').style.display = 'none';
            document.getElementById('retryLimitInput').disabled = false;
            document.getElementById('queryProgress').classList.remove('show');
        }

        function persistMultiBatchJobs() {
            sessionStorage.setItem('crm_multi_batch_jobs', JSON.stringify(multiBatchJobs));
        }

        function clearMultiBatchJobs() {
            multiBatchJobs = {};
            sessionStorage.removeItem('crm_multi_batch_jobs');
        }

        function restoreMultiBatchJobs() {
            try {
                const raw = sessionStorage.getItem('crm_multi_batch_jobs');
                multiBatchJobs = raw ? JSON.parse(raw) : {};
                if (!multiBatchJobs || !multiBatchJobs.slots || !Array.isArray(multiBatchJobs.pending)) {
                    clearMultiBatchJobs();
                    isMultiBatchRunning = false;
                    return;
                }
                Object.values(multiBatchJobs.slots || {}).forEach(slot => {
                    if (slot.running && slot.barcode && !slot.startedAt) slot.startedAt = Date.now();
                    if (!slot.running) slot.startedAt = 0;
                });
                if (!multiBatchJobs.startedAtMs && multiBatchJobs.started_at) {
                    const parsedStartedAt = Date.parse(multiBatchJobs.started_at);
                    if (Number.isFinite(parsedStartedAt)) multiBatchJobs.startedAtMs = parsedStartedAt;
                }
                isMultiBatchRunning = true;
            } catch(e) {
                clearMultiBatchJobs();
                isMultiBatchRunning = false;
            }
        }

        function multiSlotRows() {
            return Object.values((multiBatchJobs && multiBatchJobs.slots) || {});
        }

        function getUniqueBarcodesFromInput() {
            const barcodes = parseBarcodeText(document.getElementById('batchInput').value.trim());
            const seen = new Set();
            const uniqueBarcodes = barcodes.filter(b => {
                if (seen.has(b)) return false;
                seen.add(b);
                return true;
            });
            const dupCount = barcodes.length - uniqueBarcodes.length;
            if (dupCount > 0) {
                log(`发现 ${dupCount} 个重复条码，已自动去除`, 'warn');
            }
            return uniqueBarcodes;
        }

        function clearQueryInput() {
            document.getElementById('batchInput').value = '';
            saveQueryInput();
            showToast('已清空输入框');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function parseBarcodeText(text) {
            return String(text || '')
                .split(/[\s,，;；]+/)
                .map(b => b.trim())
                .filter(Boolean);
        }

        function setProgress(id, pct) {
            const bar = document.getElementById(id);
            bar.style.width = pct + '%';
        }

        function getRetryLimit() {
            const input = document.getElementById('retryLimitInput');
            let value = Number.parseInt(input.value, 10);
            if (Number.isNaN(value)) value = 5;
            value = Math.max(0, Math.min(5, value));
            input.value = value;
            return value;
        }

        function openLoginModal() {
            const modal = document.getElementById('loginModal');
            modal.classList.add('show');
            document.getElementById('captchaRow').style.display = 'none';
            document.getElementById('captchaSubmitBtn').style.display = 'none';
            document.getElementById('resetLoginBtn').style.display = 'none';
            document.getElementById('modalLoginBtn').style.display = '';
            document.getElementById('modalLoginBtn').disabled = false;
            document.getElementById('modalLoginBtn').textContent = '批量登录';
            document.getElementById('captchaInput').value = '';
            const savedUsername = localStorage.getItem('crm_username');
            const savedPassword = localStorage.getItem('crm_password');
            if (savedUsername) document.getElementById('loginUsername').value = savedUsername;
            if (savedPassword) document.getElementById('loginPassword').value = savedPassword;
            setTimeout(() => document.getElementById('loginUsername').focus(), 50);
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('show');
        }

        async function cancelLogin() {
            closeLoginModal();
            document.getElementById('captchaRow').style.display = 'none';
            document.getElementById('captchaSubmitBtn').style.display = 'none';
            document.getElementById('resetLoginBtn').style.display = 'none';
            document.getElementById('modalLoginBtn').style.display = '';
            document.getElementById('modalLoginBtn').disabled = false;
            document.getElementById('modalLoginBtn').textContent = '批量登录';
            document.getElementById('captchaSubmitBtn').disabled = false;
            document.getElementById('captchaSubmitBtn').textContent = '提交验证码';
            document.getElementById('resetLoginBtn').disabled = false;
            document.getElementById('captchaInput').value = '';
            document.getElementById('loginProgress').classList.remove('show');
            try {
                const slots = pendingLoginSlots.length ? pendingLoginSlots : [{id: currentQuerySlot}];
                await Promise.all(slots.map(slot => fetch('/api/crm/login/cancel?kind=query&slot_id=' + encodeURIComponent(slot.id), {method:'POST'}).catch(() => {})));
            } catch(e) {
                console.error(e);
            }
            pendingLoginSlots = [];
            checkStatus();
        }

        async function checkStatus() {
            try {
                refreshAppAccountStatus();
                await loadSlots();
                const browserDot = document.getElementById('browserDot');
                const loginDot = document.getElementById('loginDot');
                const loginStatus = document.getElementById('loginStatus');
                const loginBtn = document.getElementById('loginBtn');
                const logoutBtn = document.getElementById('logoutBtn');
                const batchQueryBtn = document.getElementById('batchQueryBtn');
                const totalSlots = querySlots.length || 1;
                const loggedSlots = querySlots.filter(slot => slot.logged_in).length;
                const browserRunning = querySlots.some(slot => slot.browser_running);

                if (browserRunning) {
                    browserDot.className = 'status-dot green';
                    if (loggedSlots > 0) {
                        loginDot.className = 'status-dot green';
                        loginStatus.textContent = `已登录 ${loggedSlots}/${totalSlots}`;
                        loginBtn.style.display = loggedSlots < totalSlots ? '' : 'none';
                        logoutBtn.style.display = '';
                        batchQueryBtn.disabled = isBatchRunning || batchStartPending || isMultiBatchRunning;
                    } else {
                        loginDot.className = 'status-dot red';
                        loginStatus.textContent = '未登录';
                        loginBtn.style.display = '';
                        logoutBtn.style.display = 'none';
                        batchQueryBtn.disabled = isBatchRunning || batchStartPending || isMultiBatchRunning;
                    }
                } else {
                    browserDot.className = 'status-dot gray';
                    loginDot.className = 'status-dot gray';
                    loginStatus.textContent = '未启动';
                    loginBtn.style.display = '';
                    logoutBtn.style.display = 'none';
                    batchQueryBtn.disabled = isBatchRunning || batchStartPending || isMultiBatchRunning;
                }
            } catch(e) {
                console.error(e);
            }
        }

        async function refreshAppAccountStatus() {
            const data = await fetch('/api/app-auth/status').then(r => r.json()).catch(() => ({}));
            const el = document.getElementById('appAccountStatus');
            if (el) el.textContent = data.account ? data.account.username : '未登录';
        }

        async function doLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!username || !password) { showToast('请输入账号密码'); return; }

            const btn = document.getElementById('modalLoginBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> 登录中...';
            document.getElementById('loginProgress').classList.add('show');
            document.getElementById('resetLoginBtn').style.display = 'none';
            setProgress('loginProgressBar', 20);
            log('开始批量登录查询通道...', 'info');
            pendingLoginSlots = [];

            try {
                await loadSlots();
                const targets = querySlots.filter(slot => !slot.logged_in);
                localStorage.setItem('crm_username', username);
                localStorage.setItem('crm_password', password);
                if (!targets.length) {
                    setProgress('loginProgressBar', 100);
                    document.getElementById('loginProgress').classList.remove('show');
                    log('所有查询通道都已登录', 'success');
                    showToast('所有查询通道都已登录');
                    closeLoginModal();
                } else {
                    log(`开始登录 ${targets.length} 个查询通道`, 'info');
                    for (let index = 0; index < targets.length; index += 1) {
                        const slot = targets[index];
                        setProgress('loginProgressBar', Math.round((index / targets.length) * 80) + 10);
                        log(`打开 ${slot.label} 登录页`, 'info');
                        try {
                            const r = await fetch('/api/crm/login-step1', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify(slotLoginPayload(slot, {username, password}))
                            });
                            const d = await r.json();
                            const msg = d.message || d.error || '';
                            if (!d.success) {
                                log(`${slot.label} 登录失败: ${msg || '未知错误'}`, 'error');
                                continue;
                            }
                            if (isLoggedInMessage(msg)) {
                                log(`${slot.label} 已登录`, 'success');
                                continue;
                            }
                            pendingLoginSlots.push(slot);
                            log(`${slot.label} 已进入验证码步骤`, msg === 'captcha_not_found' ? 'warn' : 'success');
                        } catch(e) {
                            log(`${slot.label} 登录请求出错: ${e}`, 'error');
                        }
                    }
                    setProgress('loginProgressBar', 100);
                    document.getElementById('loginProgress').classList.remove('show');

                    if (pendingLoginSlots.length) {
                        document.getElementById('captchaRow').style.display = '';
                        document.getElementById('modalLoginBtn').style.display = 'none';
                        document.getElementById('captchaSubmitBtn').style.display = '';
                        document.getElementById('resetLoginBtn').style.display = '';
                        document.getElementById('loginPassword').value = '';
                        document.getElementById('captchaInput').focus();
                        log(`请输入短信验证码，将同步提交到 ${pendingLoginSlots.length} 个查询通道`, 'success');
                        showToast('验证码已发送，请输入短信验证码');
                    } else {
                        log('批量登录完成', 'success');
                        showToast('批量登录完成');
                        closeLoginModal();
                    }
                }
            } catch(e) {
                log('登录出错: ' + e, 'error');
                document.getElementById('loginProgress').classList.remove('show');
            }
            btn.disabled = false;
            btn.textContent = '批量登录';
            checkStatus();
        }

        async function doLoginStep2() {
            const captcha = document.getElementById('captchaInput').value.trim();
            if (!captcha) { showToast('请输入验证码'); return; }

            const btn = document.getElementById('captchaSubmitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> 提交中...';
            log(`提交验证码到 ${pendingLoginSlots.length || 1} 个查询通道...`, 'info');

            try {
                const targets = pendingLoginSlots.length ? pendingLoginSlots : [{id: currentQuerySlot, kind: 'query', label: '当前查询通道'}];
                const stillPending = [];
                for (const slot of targets) {
                    try {
                        const r = await fetch('/api/crm/login-step2', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify(slotLoginPayload(slot, {captcha}))
                        });
                        const d = await r.json();
                        if (d.success) {
                            log(`${slot.label || slot.id} 登录成功`, 'success');
                        } else {
                            stillPending.push(slot);
                            log(`${slot.label || slot.id} 验证码错误: ${d.message || d.error || '未知错误'}`, 'error');
                        }
                    } catch(e) {
                        stillPending.push(slot);
                        log(`${slot.label || slot.id} 提交验证码出错: ${e}`, 'error');
                    }
                }
                pendingLoginSlots = stillPending;
                if (!pendingLoginSlots.length) {
                    log('批量登录成功！', 'success');
                    showToast('批量登录成功');
                    closeLoginModal();
                    document.getElementById('captchaRow').style.display = 'none';
                    document.getElementById('resetLoginBtn').style.display = 'none';
                    document.getElementById('loginBtn').style.display = 'none';
                    document.getElementById('logoutBtn').style.display = '';
                    document.getElementById('batchQueryBtn').disabled = false;
                    document.getElementById('captchaInput').value = '';
                } else {
                    showToast(`${pendingLoginSlots.length} 个查询通道仍未登录`);
                    document.getElementById('resetLoginBtn').style.display = '';
                }
            } catch(e) {
                log('提交验证码出错: ' + e, 'error');
            }
            btn.disabled = false;
            btn.textContent = '提交验证码';
            checkStatus();
        }

        async function restartLogin() {
            const btn = document.getElementById('resetLoginBtn');
            btn.disabled = true;
            log('正在重置登录状态并重新打开登录页...', 'warn');
            try {
                const slots = pendingLoginSlots.length ? pendingLoginSlots : [{id: currentQuerySlot}];
                await Promise.all(slots.map(slot => fetch('/api/crm/login/cancel?kind=query&slot_id=' + encodeURIComponent(slot.id), {method:'POST'}).catch(() => {})));
            } catch(e) {
                console.error(e);
            }
            pendingLoginSlots = [];

            document.getElementById('captchaRow').style.display = 'none';
            document.getElementById('captchaSubmitBtn').style.display = 'none';
            document.getElementById('resetLoginBtn').style.display = 'none';
            document.getElementById('modalLoginBtn').style.display = '';
            document.getElementById('captchaInput').value = '';
            const savedPassword = localStorage.getItem('crm_password');
            if (savedPassword) document.getElementById('loginPassword').value = savedPassword;
            btn.disabled = false;
            await doLogin();
        }

        async function doLogout() {
            log('正在退出所有查询通道...', 'warn');
            localStorage.removeItem('crm_username');
            localStorage.removeItem('crm_password');
            await loadSlots();
            const slots = querySlots.length ? querySlots : [{id: currentQuerySlot}];
            await Promise.all(slots.map(slot => fetch('/api/crm/logout?kind=query&slot_id=' + encodeURIComponent(slot.id), {method:'POST'}).catch(() => {})));
            log('所有查询通道已退出', 'warn');
            closeLoginModal();
            checkStatus();
            showToast('已退出登录');
        }

        async function queryBarcode() {
            doBatchQuery();
        }

        async function doSingleQuery(barcode) {
            document.getElementById('queryProgress').classList.add('show');
            setProgress('queryProgressBar', 10);
            log(`查询条码: ${barcode}`, 'info');

            try {
                const r = await fetch('/api/crm/query', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(slotPayload({barcode}))
                });
                const d = await r.json();
                setProgress('queryProgressBar', 100);
                document.getElementById('queryProgress').classList.remove('show');

                if (d.success) {
                    log(`查询成功: ${barcode}`, 'success');
                } else {
                    log(`查询失败: ${barcode} - ${d.error}`, 'error');
                }
            } catch(e) {
                log(`查询出错: ${barcode} - ${e}`, 'error');
                document.getElementById('queryProgress').classList.remove('show');
            }
        }

        async function doBatchQuery() {
            if (isBatchRunning || batchStartPending || isMultiBatchRunning) { showToast('批量查询进行中'); return; }
            const uniqueBarcodes = getUniqueBarcodesFromInput();
            if (uniqueBarcodes.length === 0) { showToast('没有有效条码'); return; }

            if (isBatchRunning || batchStartPending || isMultiBatchRunning) { showToast('批量查询进行中'); return; }
            doMultiBatchQuery(uniqueBarcodes);
        }

        async function doMultiBatchQuery(uniqueBarcodes) {
            if (isBatchRunning || batchStartPending || isMultiBatchRunning) { showToast('批量查询进行中'); return; }
            if (uniqueBarcodes.length === 0) { showToast('没有有效条码'); return; }

            batchStartPending = true;
            saveQueryInput();
            await loadSlots();
            const loggedSlots = querySlots.filter(slot => slot.logged_in);
            const skippedSlots = querySlots.filter(slot => !slot.logged_in);
            if (!loggedSlots.length) {
                batchStartPending = false;
                log('没有已登录的查询通道，请先点击批量登录 CRM', 'warn');
                showToast('没有已登录的查询通道');
                return;
            }
            if (skippedSlots.length) {
                log(`跳过 ${skippedSlots.length} 个未登录查询通道：${skippedSlots.map(s => s.label).join('，')}`, 'warn');
            }

            const retryLimit = getRetryLimit();
            multiBatchJobs = {
                pending: [...uniqueBarcodes],
                slots: {},
                total: uniqueBarcodes.length,
                completed: 0,
                successCount: 0,
                failedCount: 0,
                failedBarcodes: [],
                notices: [],
                retryLimit,
                stopRequested: false,
                startedAtMs: Date.now(),
                started_at: new Date().toISOString()
            };
            loggedSlots.forEach(slot => {
                multiBatchJobs.slots[slot.id] = {
                    slot_id: slot.id,
                    label: slot.label,
                    job_id: '',
                    barcode: '',
                    lastLogSeq: 0,
                    running: false,
                    current: 0,
                    startedAt: 0,
                    cooldownUntil: 0
                };
            });
            lastBatchLogSeq = 0;
            if (window.globalLogAppend) window.globalLogAppend(`开始多线程查询，共 ${uniqueBarcodes.length} 个条码`, 'info');
            setProgress('queryProgressBar', 0);
            setQueryButtonsRunning('多线程查询中...', '停止多线程查询');
            isMultiBatchRunning = true;
            persistMultiBatchJobs();
            if (skippedSlots.length) {
                rememberQueryNotice(`有 ${skippedSlots.length} 个查询通道未登录，本次只使用已登录通道`);
            }
            renderQuerySummary(`开始查询，共 ${uniqueBarcodes.length} 个条码`);
            await Promise.all(loggedSlots.map(slot => startNextMultiBarcode(slot.id)));
            batchStartPending = false;
            pollMultiBatchStatus();
        }

        async function startNextMultiBarcode(slotId) {
            if (!isMultiBatchRunning || !multiBatchJobs || multiBatchJobs.stopRequested) return false;
            const slot = multiBatchJobs.slots && multiBatchJobs.slots[slotId];
            if (!slot || slot.running || !multiBatchJobs.pending.length) return false;
            if (slot.cooldownUntil && Date.now() < slot.cooldownUntil) return false;
            const barcode = multiBatchJobs.pending.shift();
            slot.barcode = barcode;
            slot.job_id = '';
            slot.lastLogSeq = 0;
            slot.current = 0;
            slot.running = true;
            slot.startedAt = Date.now();
            persistMultiBatchJobs();
            try {
                const r = await fetch('/api/crm/batch/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        slot_id: slot.slot_id,
                        kind: 'query',
                        barcodes: [barcode],
                        retry_limit: multiBatchJobs.retryLimit
                    })
                });
                const d = await r.json();
                if (!d.success) {
                    const errorText = d.error || '未知错误';
                    slot.running = false;
                    slot.job_id = '';
                    slot.barcode = '';
                    slot.current = 0;
                    slot.startedAt = 0;
                    if (errorText.includes('已有批量查询正在运行')) {
                        slot.cooldownUntil = Date.now() + 5000;
                        multiBatchJobs.pending.push(barcode);
                        rememberQueryNotice(`${barcode} 已放回队列稍后重查`);
                    } else {
                        multiBatchJobs.completed += 1;
                        multiBatchJobs.failedCount += 1;
                        rememberFailedBarcode(barcode);
                        rememberQueryNotice(`${barcode} 启动查询失败：${errorText}`);
                    }
                    persistMultiBatchJobs();
                    renderQuerySummary('查询中');
                    return false;
                }
                slot.job_id = d.job_id || '';
                slot.cooldownUntil = 0;
                persistMultiBatchJobs();
                renderQuerySummary('查询中');
                return true;
            } catch(e) {
                slot.running = false;
                slot.job_id = '';
                slot.barcode = '';
                slot.startedAt = 0;
                multiBatchJobs.completed += 1;
                multiBatchJobs.failedCount += 1;
                rememberFailedBarcode(barcode);
                rememberQueryNotice(`${barcode} 启动查询出错：${e}`);
                persistMultiBatchJobs();
                renderQuerySummary('查询中');
                return false;
            }
        }

        async function pollMultiBatchStatus() {
            if (isMultiBatchPolling) return;
            if (!multiBatchJobs || !multiBatchJobs.slots || !multiSlotRows().length) {
                isMultiBatchRunning = false;
                resetQueryButtons();
                return;
            }
            isMultiBatchPolling = true;
            let anyRunning = false;
            let activeCurrent = 0;

            try {
                for (const job of multiSlotRows()) {
                    try {
                        if (job.job_id) {
                            const requestedJobId = job.job_id;
                            const requestedBarcode = job.barcode;
                            const requestedLastLogSeq = job.lastLogSeq || 0;
                            const params = new URLSearchParams({
                                since: String(requestedLastLogSeq),
                                slot_id: job.slot_id,
                                job_id: requestedJobId,
                                include_results: '1'
                            });
                            const r = await fetch('/api/crm/batch/status?' + params.toString());
                            const d = await r.json();
                            if (!d.success) {
                                anyRunning = true;
                                continue;
                            }
                            if (job.job_id !== requestedJobId) {
                                continue;
                            }
                            if ((d.job_id || '') !== requestedJobId) {
                                anyRunning = true;
                                continue;
                            }
                            (d.logs || []).forEach(entry => {
                                if (window.globalLogAppend) {
                                    window.globalLogAppend(`${job.label || job.slot_id}：${entry.message || ''}`, entry.level || 'dim', entry.time || '');
                                }
                            });
                            job.lastLogSeq = Math.max(job.lastLogSeq || 0, Number(d.log_seq || 0));
                            job.current = d.current || 0;
                            if (d.running) {
                                if (!job.startedAt) job.startedAt = Date.now();
                                anyRunning = true;
                                activeCurrent += Math.min(job.current || 0, 1);
                            } else if (job.running) {
                                const resultRows = Array.isArray(d.results) ? d.results : [];
                                resultRows.filter(row => !row.success).forEach(row => rememberFailedBarcode(row.barcode || requestedBarcode));
                                job.running = false;
                                job.job_id = '';
                                multiBatchJobs.completed += 1;
                                multiBatchJobs.successCount += d.success_count || 0;
                                multiBatchJobs.failedCount += d.failed_count || 0;
                                if (d.failed_count) rememberFailedBarcode(job.barcode);
                                job.barcode = '';
                                job.current = 0;
                                job.startedAt = 0;
                                const started = await startNextMultiBarcode(job.slot_id);
                                if (started) anyRunning = true;
                            }
                        } else if (!multiBatchJobs.stopRequested && multiBatchJobs.pending.length) {
                            const started = await startNextMultiBarcode(job.slot_id);
                            if (started) anyRunning = true;
                        }
                    } catch(e) {
                        rememberQueryNotice(`查询状态读取失败，稍后继续检查`);
                        if (job.job_id) anyRunning = true;
                    }
                }

                const total = multiBatchJobs.total || 0;
                const pct = total ? Math.round(((multiBatchJobs.completed || 0) + activeCurrent) / total * 100) : 0;
                setProgress('queryProgressBar', pct);
                persistMultiBatchJobs();
                renderQuerySummary('查询中');

                if (anyRunning || (!multiBatchJobs.stopRequested && multiBatchJobs.pending.length)) {
                    isMultiBatchRunning = true;
                    setQueryButtonsRunning('多线程查询中...', '停止多线程查询');
                    if (!multiBatchPollTimer) {
                        multiBatchPollTimer = setInterval(pollMultiBatchStatus, 1000);
                    }
                    return;
                }

                isMultiBatchRunning = false;
                if (multiBatchPollTimer) {
                    clearInterval(multiBatchPollTimer);
                    multiBatchPollTimer = null;
                }
                const wasStopped = !!multiBatchJobs.stopRequested;
                renderQuerySummary(wasStopped ? '查询已停止' : '查询完成');
                resetQueryButtons();
                clearMultiBatchJobs();
                checkStatus();
            } finally {
                isMultiBatchPolling = false;
            }
        }

        async function stopBatch() {
            if (isMultiBatchRunning) {
                log('正在停止所有多线程查询任务...', 'warn');
                multiBatchJobs.stopRequested = true;
                multiBatchJobs.pending = [];
                persistMultiBatchJobs();
                await Promise.all(multiSlotRows().filter(job => job.job_id).map(job => fetch('/api/crm/batch/stop', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({slot_id: job.slot_id, kind: 'query', job_id: job.job_id})
                }).catch(() => {})));
                pollMultiBatchStatus();
                return;
            }
            showToast('当前没有正在查询的任务');
        }

        restoreMultiBatchJobs();
        checkStatus();
        setInterval(checkStatus, 5000);
        if (isMultiBatchRunning) {
            pollMultiBatchStatus();
        }

        // 页面加载时自动填入保存的用户名
        const savedUsername = localStorage.getItem('crm_username');
        if (savedUsername) {
            document.getElementById('loginUsername').value = savedUsername;
        }

        // 页面加载时恢复当前查询窗口自己的条码
        restoreQueryInput();
        if (document.getElementById('batchInput').value) {
            log('已恢复上次的条码列表', 'info');
        }
    </script>
