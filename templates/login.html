<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <style>
        * { box-sizing:border-box; margin:0; padding:0; }
        body { min-height:100vh; background:#eef3f8; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:#202938; }
        .page-shell { width:min(1280px, 100%); margin:0 auto; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
        .login-card { width:min(460px,100%); background:#fff; border:1px solid #d9e1ec; border-radius:10px; box-shadow:0 24px 70px rgba(15,23,42,.18); padding:24px; }
        h1 { font-size:24px; margin-bottom:6px; }
        p { color:#667085; font-size:13px; margin-bottom:18px; }
        label { display:block; font-size:12px; color:#667085; font-weight:800; margin:12px 0 6px; }
        input { width:100%; border:1px solid #cfd8e3; border-radius:6px; padding:10px 11px; font-size:15px; outline:none; background:#fff; }
        input:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.12); }
        .btn { width:100%; min-height:40px; margin-top:16px; border:none; border-radius:8px; background:#2563eb; color:#fff; font-weight:900; cursor:pointer; }
        .error { display:none; margin-top:12px; color:#b91c1c; background:#fee2e2; border:1px solid #fecaca; border-radius:8px; padding:9px 10px; font-size:13px; }
        .hint { margin-top:14px; color:#94a3b8; font-size:12px; line-height:1.6; }
    </style>
</head>
<body>
    <div class="page-shell">
        <div class="login-card">
            <h1>登录工作台</h1>
            <p>请输入工具账号后继续使用 CRM 条码查询系统。</p>
            <label>账号</label>
            <input id="username" placeholder="请输入账号" autocomplete="username">
            <label>密码</label>
            <input id="password" type="password" placeholder="密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
            <button class="btn" onclick="login()">登录</button>
            <div class="error" id="errorBox"></div>
        </div>
    </div>
<script>
function showError(message) {
    const box = document.getElementById('errorBox');
    box.textContent = message;
    box.style.display = '';
}

async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const data = await fetch('/api/app-auth/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username, password})
    }).then(res => res.json()).catch(e => ({success:false, error:e.message}));
    if (!data.success) return showError(data.error || '登录失败');
    const next = new URLSearchParams(location.search).get('next');
    location.href = next && next.startsWith('/') ? next : '/';
}

fetch('/api/app-auth/status')
    .then(res => res.json())
    .then(data => {
        if (data.account) {
            const next = new URLSearchParams(location.search).get('next');
            location.href = next && next.startsWith('/') ? next : '/';
        }
    })
    .catch(() => {});
</script>
</body>
</html>
