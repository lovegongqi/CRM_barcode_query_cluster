<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可访问页面</title>
    <style>
        * { box-sizing:border-box; margin:0; padding:0; }
        body { min-height:100vh; background:#f4f7fb; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:#202938; }
        .container { max-width:1280px; margin:0 auto; padding:24px; }
        .card { background:#fff; border:1px solid #d9e1ec; border-radius:8px; padding:22px; box-shadow:0 8px 24px rgba(15,23,42,.06); }
        h1 { font-size:24px; margin-bottom:8px; }
        p { color:#667085; font-size:13px; line-height:1.7; margin-bottom:16px; }
        .links { display:flex; gap:10px; flex-wrap:wrap; }
        .links a { text-decoration:none; background:#2563eb; color:#fff; border-radius:8px; padding:9px 14px; font-size:13px; font-weight:900; }
        .secondary { background:#e5e7eb !important; color:#334155 !important; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>当前账号无权访问该页面</h1>
        <p>当前账号：{{ account.username if account else '未登录' }}。你可以访问下面这些页面。</p>
        <div class="links">
            {% for link in links %}
            <a href="{{ link.href }}">{{ link.label }}</a>
            {% endfor %}
            <a class="secondary" href="/logout">退出登录</a>
        </div>
    </div>
</div>
</body>
</html>
