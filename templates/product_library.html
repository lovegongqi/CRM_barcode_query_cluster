<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品库</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7fb; color: #202938; min-height: 100vh; }
        .container { max-width: 1120px; margin: 0 auto; padding: 24px; }
        .header { display:flex; justify-content:space-between; gap:16px; align-items:flex-end; margin-bottom:20px; }
        h1 { font-size:26px; margin-bottom:6px; }
        .muted { color:#667085; font-size:13px; }
        .page-nav { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
        .page-nav a { font-size:13px; font-weight:800; color:#667085; text-decoration:none; padding:8px 14px; border:1px solid #d9e1ec; border-radius:999px; background:#fff; }
        .page-nav a.active { background:#2563eb; color:#fff; border-color:#2563eb; }
        .status-bar { display:flex; align-items:center; justify-content:space-between; gap:12px; background:#fff; border:1px solid #d9e1ec; border-radius:8px; padding:12px 14px; margin-bottom:16px; box-shadow:0 6px 18px rgba(15,23,42,.05); }
        .status-bar.wrap { align-items:flex-end; flex-wrap:wrap; }
        .status-text { font-size:13px; font-weight:800; color:#334155; }
        .status-text .dot { display:inline-block; width:9px; height:9px; border-radius:50%; background:#94a3b8; margin-right:6px; }
        .status-text .dot.green { background:#16a34a; }
        .status-text .dot.red { background:#dc2626; }
        .card { background:#fff; border:1px solid #d9e1ec; border-radius:8px; padding:18px; box-shadow:0 8px 24px rgba(15,23,42,.06); margin-bottom:16px; }
        .card h2 { font-size:16px; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid #e5e7eb; }
        label { display:block; font-size:12px; color:#667085; font-weight:700; margin-bottom:6px; }
        input { width:100%; border:1px solid #cfd8e3; border-radius:6px; padding:9px 10px; font-size:14px; outline:none; background:#fff; }
        input:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.12); }
        .note { background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; color:#475569; font-size:12px; line-height:1.6; padding:10px 12px; margin-bottom:12px; }
        .library-form { display:grid; grid-template-columns: .7fr 1fr 1.2fr auto; gap:8px; align-items:end; margin-bottom:12px; }
        .auth-form { display:flex; gap:8px; flex-wrap:wrap; align-items:end; }
        .auth-form input { width:160px; }
        .btn { min-height:38px; padding:8px 16px; border:none; border-radius:8px; font-weight:800; cursor:pointer; }
        .btn-primary { background:#2563eb; color:#fff; }
        .btn-secondary { background:#e5e7eb; color:#334155; }
        .btn-danger { background:#dc2626; color:#fff; }
        .log { background:#0f172a; color:#d4d4d4; border-radius:8px; padding:12px; font-family:"Courier New", monospace; font-size:12px; max-height:260px; overflow:auto; line-height:1.7; margin-top:12px; }
        .log .info { color:#4fc3f7; } .log .success { color:#81c784; } .log .error { color:#e57373; } .log .warn { color:#ffb74d; } .log .dim { color:#94a3b8; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th, td { border-bottom:1px solid #e5e7eb; padding:8px 10px; text-align:left; vertical-align:top; }
        th { background:#f8fafc; color:#475569; }
        @media (max-width: 860px) { .header { flex-direction:column; align-items:flex-start; } .library-form { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>产品库</h1>
            <p class="muted">维护条码前缀、产品编码和产品名称。已查询条码会自动更新这里。</p>
        </div>
        <div class="page-nav">
            <a href="/crm">在线查询</a>
            <a href="/">结果管理</a>
            <a href="/transfer">移库</a>
            <a href="/accounts">账号管理</a>
            <a class="active" href="/product-library">产品库</a>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-text"><span class="dot" id="loginDot"></span>CRM 登录状态：<span id="loginStatus">检测中</span></div>
        <button class="btn btn-primary" onclick="location.href='/crm'">登录 CRM</button>
    </div>
    <div class="status-bar wrap">
        <div class="status-text">工具账号：<span id="accountStatus">未登录</span></div>
        <div class="auth-form">
            <div><label>账号</label><input id="authUsername" placeholder="admin"></div>
            <div><label>密码</label><input id="authPassword" type="password" placeholder="密码"></div>
            <button class="btn btn-primary" onclick="loginAccount()">登录</button>
            <button class="btn btn-secondary" onclick="logoutAccount()">退出</button>
        </div>
    </div>

    <div class="card">
        <h2>条码识别</h2>
        <div class="library-form">
            <div style="grid-column:span 2"><label>输入条码</label><input id="lookupBarcode" placeholder="输入条码快速识别机器" inputmode="latin" lang="en" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" oninput="scheduleLookup()"></div>
            <button class="btn btn-primary" onclick="lookupBarcode()">识别</button>
            <button class="btn btn-secondary" onclick="confirmQueryBarcode()">确认查询</button>
        </div>
        <div id="lookupBox" class="note">输入条码后会优先匹配已查询结果和产品库前缀。</div>
        <div class="log" id="queryLog" style="display:none"></div>
    </div>

    <div class="card" id="editCard" style="display:none">
        <h2>产品匹配规则</h2>
        <div class="note">前缀默认是条码去掉最后 10 位。比如 162501010001 的默认产品前缀是 16。</div>
        <div class="library-form">
            <div><label>条码前缀</label><input id="libPrefix" placeholder="如 16" inputmode="latin" lang="en" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></div>
            <div><label>产品编码</label><input id="libCode" placeholder="916000024" inputmode="latin" lang="en" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></div>
            <div><label>产品名称</label><input id="libName" placeholder="软水机6系列 609ECM"></div>
            <button class="btn btn-primary" onclick="saveLibrary()">保存</button>
        </div>
        <div id="libraryBox"></div>
    </div>
</div>

<script>
function escapeHtml(text) {
    return String(text || '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

async function loadLibrary() {
    const res = await fetch('/api/product-library');
    const data = await res.json();
    const rows = data.products || [];
    document.getElementById('editCard').style.display = data.can_edit ? '' : 'none';
    document.getElementById('accountStatus').textContent = data.account ? `${data.account.username}${data.can_edit ? '（管理员）' : ''}` : '未登录';
    document.getElementById('libraryBox').innerHTML = `
        <table>
            <thead><tr><th>前缀</th><th>产品编码</th><th>产品名称</th><th>来源条码</th><th>更新</th><th></th></tr></thead>
            <tbody>${rows.map(row => `
                <tr>
                    <td>${escapeHtml(row.prefix)}</td>
                    <td>${escapeHtml(row.product_code)}</td>
                    <td>${escapeHtml(row.product_name)}</td>
                    <td>${escapeHtml(row.source_barcode || '')}</td>
                    <td>${escapeHtml(row.updated_at || '')}</td>
                    <td>${data.can_edit ? `<button class="btn btn-danger" onclick="deleteLibrary('${escapeHtml(row.prefix)}')">删除</button>` : '只读'}</td>
                </tr>
            `).join('') || '<tr><td colspan="6">暂无产品库规则</td></tr>'}</tbody>
        </table>`;
}

async function saveLibrary() {
    const payload = {
        prefix: document.getElementById('libPrefix').value.trim(),
        product_code: document.getElementById('libCode').value.trim(),
        product_name: document.getElementById('libName').value.trim()
    };
    const res = await fetch('/api/product-library', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!data.success) return alert(data.error || '保存失败');
    document.getElementById('libPrefix').value = '';
    document.getElementById('libCode').value = '';
    document.getElementById('libName').value = '';
    loadLibrary();
}

async function deleteLibrary(prefix) {
    if (!confirm('确定删除前缀 ' + prefix + ' ？')) return;
    const data = await fetch('/api/product-library/' + encodeURIComponent(prefix), {method: 'DELETE'}).then(res => res.json());
    if (!data.success) return alert(data.error || '删除失败');
    loadLibrary();
}

loadLibrary();

let lookupTimer = null;
let queryTimer = null;
function scheduleLookup() {
    clearTimeout(lookupTimer);
    lookupTimer = setTimeout(() => {
        const barcode = document.getElementById('lookupBarcode').value.trim();
        if (barcode.length >= 6) lookupBarcode();
    }, 350);
}

async function lookupBarcode() {
    const barcode = document.getElementById('lookupBarcode').value.trim();
    if (!barcode) return alert('请输入条码');
    const res = await fetch('/api/product-library/lookup?barcode=' + encodeURIComponent(barcode));
    const data = await res.json();
    const box = document.getElementById('lookupBox');
    if (data.success) {
        const info = data.info || {};
        box.innerHTML = `产品名称：<strong>${escapeHtml(info.product_name)}</strong><br>产品编码：<strong>${escapeHtml(info.product_code)}</strong><br>匹配来源：${escapeHtml(info.source === 'query_result' ? '查询结果' : '产品库')} ${info.matched_prefix ? '，前缀 ' + escapeHtml(info.matched_prefix) : ''}`;
        return;
    }
    box.innerHTML = `没有匹配到前缀 <strong>${escapeHtml(data.prefix || '')}</strong>。是否立即查询该条码并自动补充产品库？ <button class="btn btn-primary" onclick="confirmQueryBarcode()">确认查询</button>`;
}

async function confirmQueryBarcode() {
    const barcode = document.getElementById('lookupBarcode').value.trim();
    if (!barcode) return alert('请输入条码');
    appendQueryLog('准备启动 CRM 查询...', 'info');
    const data = await fetch('/api/product-library/query/start', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({barcode})
    }).then(res => res.json());
    if (!data.success) {
        appendQueryLog(data.error || '查询启动失败', 'error');
        return;
    }
    if (queryTimer) clearInterval(queryTimer);
    queryTimer = setInterval(pollQueryStatus, 1000);
    pollQueryStatus();
}

function appendQueryLog(message, level='dim') {
    const box = document.getElementById('queryLog');
    box.style.display = '';
    const line = document.createElement('div');
    line.className = level;
    line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
}

function renderQueryLogs(logs) {
    const box = document.getElementById('queryLog');
    if (!logs || !logs.length) return;
    box.style.display = '';
    box.innerHTML = logs.map(row => `<div class="${escapeHtml(row.level || 'dim')}">[${escapeHtml(row.time || '')}] ${escapeHtml(row.message || '')}</div>`).join('');
    box.scrollTop = box.scrollHeight;
}

async function pollQueryStatus() {
    const data = await fetch('/api/product-library/query/status').then(res => res.json());
    renderQueryLogs(data.logs || []);
    if (!data.done) return;
    clearInterval(queryTimer);
    queryTimer = null;
    if (data.query_success) {
        appendQueryLog('查询完成，正在重新识别条码...', 'success');
        loadLibrary();
        lookupBarcode();
    } else {
        appendQueryLog(data.error || '查询失败', 'error');
    }
}

async function refreshCrmStatus() {
    const data = await fetch('/api/crm/status').then(r => r.json()).catch(() => ({}));
    const dot = document.getElementById('loginDot');
    const text = document.getElementById('loginStatus');
    dot.className = 'dot ' + (data.logged_in ? 'green' : 'red');
    text.textContent = data.logged_in ? '已登录' : '未登录';
}

async function loginAccount() {
    const data = await fetch('/api/app-auth/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            username: document.getElementById('authUsername').value.trim(),
            password: document.getElementById('authPassword').value
        })
    }).then(res => res.json());
    if (!data.success) return alert(data.error || '登录失败');
    document.getElementById('authPassword').value = '';
    loadLibrary();
}

async function logoutAccount() {
    await fetch('/api/app-auth/logout', {method:'POST'});
    loadLibrary();
}

refreshCrmStatus();
</script>
</body>
</html>
