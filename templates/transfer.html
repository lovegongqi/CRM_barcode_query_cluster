<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM 移库</title>
    <link rel="stylesheet" href="/static/log_modal.css">
    <script src="/static/log_modal.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7fb; color: #202938; min-height: 100vh; }
        .container { max-width: 1280px; margin: 0 auto; padding: 24px; }
        .header { display:flex; flex-direction:column; align-items:stretch; gap:12px; margin-bottom:20px; }
        h1 { font-size:26px; margin-bottom:6px; }
        .muted { color:#667085; font-size:13px; }
        .page-nav { display:flex; gap:6px; flex-wrap:nowrap; justify-content:flex-start; align-items:center; width:100%; }
        .page-nav a { flex:0 0 calc((100% - 24px)/5); width:calc((100% - 24px)/5); min-width:0; max-width:calc((100% - 24px)/5); display:inline-flex; align-items:center; justify-content:center; min-height:34px; padding:0 3px; font-size:11px; line-height:1; font-weight:800; color:#667085; text-decoration:none; border:1px solid #d9e1ec; border-radius:6px; background:#fff; white-space:nowrap; }
        .page-nav a.active { background:#2563eb; color:#fff; border-color:#2563eb; }
        .status-bar { display:flex; align-items:center; justify-content:space-between; gap:12px; background:#fff; border:1px solid #d9e1ec; border-radius:8px; padding:12px 14px; margin-bottom:16px; box-shadow:0 6px 18px rgba(15,23,42,.05); }
        .status-text { font-size:13px; font-weight:800; color:#334155; }
        .status-text .dot { display:inline-block; width:9px; height:9px; border-radius:50%; background:#94a3b8; margin-right:6px; }
        .status-text .dot.green { background:#16a34a; }
        .status-text .dot.red { background:#dc2626; }
        .grid { display:grid; grid-template-columns: 1fr; gap:16px; align-items:start; }
        .card { background:#fff; border:1px solid #d9e1ec; border-radius:8px; padding:18px; box-shadow:0 8px 24px rgba(15,23,42,.06); margin-bottom:16px; }
        .card h2 { font-size:16px; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid #e5e7eb; }
        .card-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid #e5e7eb; }
        .card-head h2 { margin:0; padding:0; border:0; }
        .crm-actions { display:flex; align-items:center; gap:8px; flex:0 0 auto; }
        .crm-actions .btn { min-height:34px; padding:6px 12px; font-size:12px; white-space:nowrap; }
        label { display:block; font-size:12px; color:#667085; font-weight:700; margin-bottom:6px; }
        textarea, input, select { width:100%; border:1px solid #cfd8e3; border-radius:6px; padding:9px 10px; font-size:14px; outline:none; background:#fff; }
        textarea { min-height:150px; font-family:"Courier New", monospace; resize:vertical; }
        textarea:focus, input:focus, select:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.12); }
        .fields { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:12px; margin:12px 0; }
        .actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; margin-top:12px; }
        .btn { min-height:38px; padding:8px 16px; border:none; border-radius:8px; font-weight:800; cursor:pointer; }
        .btn-primary { background:#2563eb; color:#fff; }
        .btn-transfer { background:#0f766e; color:#fff; }
        .btn-secondary { background:#e5e7eb; color:#334155; }
        .btn-danger { background:#dc2626; color:#fff; }
        .btn:disabled { background:#cbd5e1; cursor:not-allowed; }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(15,23,42,.45); z-index:1000; align-items:center; justify-content:center; padding:18px; }
        .modal-overlay.show { display:flex; }
        .login-modal { width:min(520px, 100%); background:#fff; border-radius:8px; box-shadow:0 24px 72px rgba(15,23,42,.28); overflow:hidden; }
        .login-modal-head { display:flex; justify-content:space-between; align-items:center; padding:14px 18px; border-bottom:1px solid #e5e7eb; }
        .login-modal-head h3 { font-size:17px; }
        .modal-close { border:none; background:transparent; font-size:24px; color:#94a3b8; cursor:pointer; }
        .login-modal-body { padding:18px; }
        .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; flex-wrap:wrap; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th, td { border-bottom:1px solid #e5e7eb; padding:8px 10px; text-align:left; vertical-align:top; }
        th { background:#f8fafc; color:#475569; }
        .summary { border:1px solid #d9e1ec; border-radius:8px; overflow:hidden; margin-top:12px; display:none; }
        .note { background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; color:#475569; font-size:12px; line-height:1.6; padding:10px 12px; margin-top:10px; }
        .blocked { background:#fff1f2; border-color:#fecaca; color:#991b1b; }
        .log { background:#0f172a; color:#d4d4d4; border-radius:8px; padding:12px; font-family:"Courier New", monospace; font-size:12px; max-height:260px; overflow:auto; line-height:1.7; }
        .log .info { color:#4fc3f7; } .log .success { color:#81c784; } .log .error { color:#e57373; } .log .warn { color:#ffb74d; } .log .dim { color:#94a3b8; }
        .pill { display:inline-block; padding:2px 7px; border-radius:999px; background:#e0f2fe; color:#0369a1; font-size:12px; font-weight:700; }
        .distributor-picker { position:relative; }
        .distributor-dropdown { display:none; position:absolute; z-index:30; top:calc(100% + 4px); left:0; right:0; max-height:220px; overflow:auto; background:#fff; border:1px solid #cfd8e3; border-radius:6px; box-shadow:0 14px 32px rgba(15,23,42,.14); }
        .distributor-dropdown.open { display:block; }
        .distributor-option { padding:9px 10px; font-size:14px; cursor:pointer; border-bottom:1px solid #eef2f7; }
        .distributor-option:last-child { border-bottom:none; }
        .distributor-option:hover, .distributor-option.active { background:#eef4ff; color:#1d4ed8; }
        .distributor-empty { padding:9px 10px; font-size:13px; color:#94a3b8; }
        .slot-tabs { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
        .slot-tab { flex:0 0 auto; min-width:96px; min-height:34px; padding:7px 10px; border:1px solid #cfd8e3; border-radius:8px; background:#fff; color:#334155; font-size:13px; line-height:1.15; font-weight:800; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .slot-tab.active { background:#0f766e; color:#fff; border-color:#0f766e; }
        .slot-tab.busy { border-color:#f59e0b; box-shadow:0 0 0 3px rgba(245,158,11,.12); }
        @media (max-width: 860px) { .container { padding:14px; } .grid, .fields { grid-template-columns:1fr; } .slot-tabs { display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); } .slot-tab { width:100%; min-width:0; padding:7px 6px; font-size:clamp(10px, 2.6vw, 13px); } }
    </style>
    <link rel="stylesheet" href="/static/app_layout.css">
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>CRM 移库</h1>
            <p class="muted">直接粘贴条码即可移库。未查询条码会按前缀匹配产品名称和编码。</p>
        </div>
        <div class="page-nav">
            {% for link in nav_links %}
            <a href="{{ link.href }}" class="{{ 'active' if link.href == '/transfer' else '' }}">{{ link.label }}</a>
            {% endfor %}
        </div>
    </div>

    <div class="status-bar">
        <div class="status-text"><span class="dot" id="loginDot"></span>CRM 登录状态：<span id="loginStatus">检测中</span></div>
        {% if not is_desktop_app %}
        <div class="status-text">工具账号：<span id="appAccountStatus">检测中</span> <a href="/logout">退出</a></div>
        {% endif %}
    </div>

    <div class="grid">
        <div>
            <div class="card">
                <div class="card-head">
                    <h2>提交移库</h2>
                    <div class="crm-actions">
                        <button class="btn btn-primary" id="loginBtn" onclick="openLoginModal()">批量登录 CRM</button>
                        <button class="btn btn-danger" id="logoutBtn" onclick="doLogout()" style="display:none">退出登录</button>
                    </div>
                </div>
                <div class="slot-tabs" id="transferSlotTabs"></div>
                <label>条码列表</label>
                <textarea id="barcodeInput" placeholder="每行一个条码，也可以用逗号、空格混合分隔" oninput="saveTransferInput()" inputmode="latin" lang="en" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="ime-mode:inactive"></textarea>
                <div class="fields">
                    <div>
                        <label>移库类型</label>
                        <select id="transferType" onchange="saveTransferInput()">
                            <option value="移出">移出</option>
                            <option value="移入">移入</option>
                        </select>
                    </div>
                    <div>
                        <label>目标分销商</label>
                        <div class="distributor-picker">
                            <input id="transferDistributor" placeholder="输入分销商名称" autocomplete="off" onfocus="showDistributorDropdown()" oninput="saveTransferInput();showDistributorDropdown()" onkeydown="handleDistributorKeydown(event)" onblur="hideDistributorDropdownSoon()">
                            <div id="distributorHistoryDropdown" class="distributor-dropdown"></div>
                        </div>
                    </div>
                    <div>
                        <label>备注</label>
                        <input id="transferRemark" placeholder="可选" oninput="saveTransferInput()">
                    </div>
                </div>
                <div class="actions">
                    <button class="btn btn-secondary" onclick="clearForm()">清空</button>
                    <button class="btn btn-primary" id="previewBtn" onclick="previewTransfer()">汇总预览</button>
                    <button class="btn btn-transfer" id="submitBtn" onclick="submitTransfer()" disabled>提交移库</button>
                </div>
                <div class="summary" id="summaryBox"></div>
            </div>

            <div class="card">
                <h2>移库日志</h2>
                <div class="log" id="transferLog"><div class="dim">等待操作...</div></div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="loginModal" onclick="if(event.target.id==='loginModal')cancelLogin()">
    <div class="login-modal">
        <div class="login-modal-head">
            <h3>批量登录 CRM</h3>
            <button class="modal-close" onclick="cancelLogin()">×</button>
        </div>
        <div class="login-modal-body">
            <div class="fields">
                <div>
                    <label>账号</label>
                    <input type="text" id="loginUsername" placeholder="CRM 用户名">
                </div>
                <div>
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="密码">
                </div>
            </div>
            <label style="display:flex;align-items:center;gap:8px;margin:10px 0 0;">
                <input type="checkbox" id="rememberCrmLogin"> 记住账号密码
            </label>
            <div id="captchaRow" style="display:none;margin-top:12px;">
                <label>短信验证码</label>
                <input type="text" id="captchaInput" placeholder="输入收到短信验证码" maxlength="6">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="cancelLogin()">取消</button>
                <button class="btn btn-primary" id="modalLoginBtn" onclick="doLogin()">批量登录</button>
                <button class="btn btn-primary" id="captchaSubmitBtn" onclick="doLoginStep2()" style="display:none">提交验证码</button>
                <button class="btn btn-secondary" id="resetLoginBtn" onclick="restartLogin()" style="display:none">重新登录</button>
            </div>
        </div>
    </div>
</div>

<script>
let lastSummary = null;
let pollTimer = null;
let previewTimer = null;
let lastRenderedLogKey = '';
let highlightedDistributorIndex = -1;
let submittedTransferDistributor = '';
let currentTransferSlot = localStorage.getItem('crm_transfer_slot') || 'transfer-1';
let currentSummaryJobId = sessionStorage.getItem(`crm_summary_job_id_${currentTransferSlot}`) || '';
let currentTransferJobId = sessionStorage.getItem(`crm_transfer_job_id_${currentTransferSlot}`) || '';
let transferSlots = [];
let pendingLoginSlots = [];
let currentLoginJobId = sessionStorage.getItem('crm_bulk_login_job_transfer') || '';
let loginPollTimer = null;
let lastLoginLogSeq = 0;
const BUSINESS_CONFIG = {{ business_config|tojson }};
const OWN_DEALER_NAME = BUSINESS_CONFIG.own_dealer_name || '江西省天麓工贸有限公司';

function applyCrmCredentialValues(remember, username='', password='', usernameId='loginUsername', passwordId='loginPassword', rememberId='rememberCrmLogin') {
    const rememberEl = document.getElementById(rememberId);
    const usernameEl = document.getElementById(usernameId);
    const passwordEl = document.getElementById(passwordId);
    if (rememberEl) rememberEl.checked = !!remember;
    if (remember) {
        localStorage.setItem('crm_remember_credentials', '1');
        localStorage.setItem('crm_username', username || '');
        localStorage.setItem('crm_password', password || '');
        if (usernameEl) usernameEl.value = username || '';
        if (passwordEl) passwordEl.value = password || '';
    } else {
        localStorage.removeItem('crm_remember_credentials');
        localStorage.removeItem('crm_username');
        localStorage.removeItem('crm_password');
        if (passwordEl) passwordEl.value = '';
    }
}

async function loadSavedCrmCredentials(usernameId='loginUsername', passwordId='loginPassword', rememberId='rememberCrmLogin') {
    const localRemember = localStorage.getItem('crm_remember_credentials') === '1';
    const localUsername = localStorage.getItem('crm_username') || '';
    const localPassword = localStorage.getItem('crm_password') || '';
    applyCrmCredentialValues(localRemember, localUsername, localPassword, usernameId, passwordId, rememberId);
    try {
        const data = await fetch('/api/crm/credentials').then(res => res.json());
        if (!data || !data.success) return;
        if (data.remember) {
            applyCrmCredentialValues(true, data.username || '', data.password || '', usernameId, passwordId, rememberId);
        } else if (localRemember && localUsername && localPassword) {
            saveCrmCredentials(localUsername, localPassword, rememberId);
        } else {
            applyCrmCredentialValues(false, '', '', usernameId, passwordId, rememberId);
        }
    } catch (e) {}
}

function saveCrmCredentials(username, password, rememberId='rememberCrmLogin') {
    const remember = !!document.getElementById(rememberId)?.checked;
    applyCrmCredentialValues(remember, username || '', password || '', 'loginUsername', 'loginPassword', rememberId);
    fetch('/api/crm/credentials', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({remember, username, password})
    }).catch(() => {});
}

function transferPayloadForSlot(slotId, extra={}) {
    return Object.assign({slot_id: slotId, kind: 'transfer'}, extra);
}

function slotLoginPayload(slot, extra={}) {
    return Object.assign({slot_id: slot.id, kind: slot.kind || 'transfer'}, extra);
}

function isLoggedInMessage(message) {
    return ['已登录（会话有效）', '登录成功', '登录成功（页面已跳转）'].includes(message || '');
}

async function loadSlots() {
    const data = await fetch('/api/crm/slots').then(r => r.json()).catch(() => null);
    if (!data || !data.success) return;
    transferSlots = data.transfer || [];
    if (!transferSlots.some(slot => slot.id === currentTransferSlot)) {
        currentTransferSlot = (data.defaults && data.defaults.transfer) || (transferSlots[0] && transferSlots[0].id) || 'transfer-1';
        localStorage.setItem('crm_transfer_slot', currentTransferSlot);
    }
    renderTransferSlots();
}

function renderTransferSlots() {
    const box = document.getElementById('transferSlotTabs');
    if (!box) return;
    box.innerHTML = transferSlots.map(slot => {
        const active = slot.id === currentTransferSlot ? ' active' : '';
        const busy = slot.browser_running && !slot.logged_in ? ' busy' : '';
        const status = slot.logged_in ? '已登录' : (slot.browser_running ? '未登录' : '未启动');
        return `<button class="slot-tab${active}${busy}" onclick="switchTransferSlot('${slot.id}')">${slot.label} · ${status}</button>`;
    }).join('');
}

function switchTransferSlot(slotId) {
    if (slotId === currentTransferSlot) return;
    saveTransferInput();
    stopActivePolling();
    currentTransferSlot = slotId;
    localStorage.setItem('crm_transfer_slot', currentTransferSlot);
    currentSummaryJobId = sessionStorage.getItem(`crm_summary_job_id_${currentTransferSlot}`) || '';
    currentTransferJobId = sessionStorage.getItem(`crm_transfer_job_id_${currentTransferSlot}`) || '';
    lastRenderedLogKey = '';
    resetTransferActionUi();
    document.getElementById('transferLog').innerHTML = '<div class="dim">等待操作...</div>';
    restoreTransferInput();
    renderTransferSlots();
    refreshCrmStatus();
    resumeBackgroundJobs();
}

function saveTransferInput() {
    sessionStorage.setItem(`transfer_page_input_${currentTransferSlot}`, document.getElementById('barcodeInput').value);
    sessionStorage.setItem(`transfer_page_distributor_${currentTransferSlot}`, document.getElementById('transferDistributor').value);
    sessionStorage.setItem(`transfer_page_type_${currentTransferSlot}`, document.getElementById('transferType').value);
    sessionStorage.setItem(`transfer_page_remark_${currentTransferSlot}`, document.getElementById('transferRemark').value);
}

function restoreTransferInput() {
    document.getElementById('barcodeInput').value = sessionStorage.getItem(`transfer_page_input_${currentTransferSlot}`) || '';
    document.getElementById('transferDistributor').value = sessionStorage.getItem(`transfer_page_distributor_${currentTransferSlot}`) || '';
    document.getElementById('transferType').value = sessionStorage.getItem(`transfer_page_type_${currentTransferSlot}`) || '移出';
    document.getElementById('transferRemark').value = sessionStorage.getItem(`transfer_page_remark_${currentTransferSlot}`) || '';
}

function escapeHtml(text) {
    return String(text || '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

function formatDuration(seconds) {
    seconds = Math.max(0, Math.floor(Number(seconds) || 0));
    const hours = Math.floor(seconds / 3600);
    const minutes = Math.floor((seconds % 3600) / 60);
    const secs = seconds % 60;
    if (hours) return `${hours}小时${minutes}分${secs}秒`;
    if (minutes) return `${minutes}分${secs}秒`;
    return `${secs}秒`;
}

function parseJobTime(value) {
    if (!value) return 0;
    const parsed = Date.parse(String(value).replace(' ', 'T'));
    return Number.isFinite(parsed) ? parsed : 0;
}

function jobDurationLine(data, runningLabel='已耗时', doneLabel='总耗时') {
    if (!data || !data.started_at) return '';
    const startedMs = parseJobTime(data.started_at);
    if (!startedMs) return '';
    const finishedMs = data.finished_at ? parseJobTime(data.finished_at) : 0;
    const label = data.done ? doneLabel : runningLabel;
    const seconds = ((finishedMs || Date.now()) - startedMs) / 1000;
    return `<div class="${data.done ? 'success' : 'dim'}">${label}：${escapeHtml(formatDuration(seconds))}</div>`;
}

function stopActivePolling() {
    if (previewTimer) {
        clearInterval(previewTimer);
        previewTimer = null;
    }
    if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
    }
}

function resetTransferActionUi() {
    document.getElementById('summaryBox').style.display = 'none';
    document.getElementById('summaryBox').innerHTML = '';
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('previewBtn').disabled = false;
    document.getElementById('previewBtn').textContent = '汇总预览';
    lastSummary = null;
}

function parseBarcodes() {
    return Array.from(new Set(document.getElementById('barcodeInput').value
        .split(/[\s,，;；]+/)
        .map(x => x.trim())
        .filter(Boolean)));
}

function loadDistributorHistory() {
    try {
        return JSON.parse(localStorage.getItem('transferDistributorHistory') || '[]')
            .map(x => String(x || '').trim())
            .filter(Boolean);
    } catch (e) {
        return [];
    }
}

function saveDistributorHistory(value) {
    const name = String(value || '').trim();
    if (!name || name === OWN_DEALER_NAME) return;
    const rows = [name, ...loadDistributorHistory().filter(x => x !== name)].slice(0, 30);
    localStorage.setItem('transferDistributorHistory', JSON.stringify(rows));
    fetch('/api/distributor-history', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({distributor: name})
    }).catch(() => {});
    renderDistributorHistory();
}

function mergeDistributorHistory(values) {
    const incoming = Array.from(new Set((values || [])
        .map(x => String(x || '').trim())
        .filter(x => x && x !== OWN_DEALER_NAME)));
    if (!incoming.length) return;
    const rows = [...incoming, ...loadDistributorHistory().filter(x => !incoming.includes(x))].slice(0, 30);
    localStorage.setItem('transferDistributorHistory', JSON.stringify(rows));
    renderDistributorHistory();
}

function filteredDistributorHistory() {
    const input = document.getElementById('transferDistributor');
    const keyword = (input ? input.value : '').trim().toLowerCase();
    const rows = loadDistributorHistory();
    if (!keyword) return rows;
    return rows.filter(name => name.toLowerCase().includes(keyword));
}

function renderDistributorHistory(open = false) {
    const input = document.getElementById('transferDistributor');
    const dropdown = document.getElementById('distributorHistoryDropdown');
    if (!dropdown) return;
    const rows = filteredDistributorHistory();
    if (highlightedDistributorIndex >= rows.length) highlightedDistributorIndex = rows.length ? rows.length - 1 : -1;
    dropdown.innerHTML = rows.length
        ? rows.map((name, index) => `<div class="distributor-option ${index === highlightedDistributorIndex ? 'active' : ''}" data-name="${escapeHtml(name)}" onmousedown="selectDistributorHistory(this.dataset.name)">${escapeHtml(name)}</div>`).join('')
        : '<div class="distributor-empty">没有匹配的历史分销商</div>';
    dropdown.classList.toggle('open', Boolean(open || document.activeElement === input));
}

function showDistributorDropdown() {
    highlightedDistributorIndex = -1;
    renderDistributorHistory(true);
}

function hideDistributorDropdownSoon() {
    setTimeout(() => {
        const dropdown = document.getElementById('distributorHistoryDropdown');
        if (dropdown) dropdown.classList.remove('open');
    }, 120);
}

function selectDistributorHistory(name) {
    document.getElementById('transferDistributor').value = name;
    saveTransferInput();
    saveDistributorHistory(name);
    const dropdown = document.getElementById('distributorHistoryDropdown');
    if (dropdown) dropdown.classList.remove('open');
}

function handleDistributorKeydown(event) {
    const rows = filteredDistributorHistory();
    if (!rows.length || !['ArrowDown', 'ArrowUp', 'Enter', 'Escape'].includes(event.key)) return;
    if (event.key === 'Escape') {
        const dropdown = document.getElementById('distributorHistoryDropdown');
        if (dropdown) dropdown.classList.remove('open');
        return;
    }
    event.preventDefault();
    if (event.key === 'ArrowDown') highlightedDistributorIndex = Math.min(highlightedDistributorIndex + 1, rows.length - 1);
    if (event.key === 'ArrowUp') highlightedDistributorIndex = Math.max(highlightedDistributorIndex - 1, 0);
    if (event.key === 'Enter' && highlightedDistributorIndex >= 0) {
        selectDistributorHistory(rows[highlightedDistributorIndex]);
        return;
    }
    renderDistributorHistory(true);
}

function clearForm() {
    if (previewTimer) {
        clearInterval(previewTimer);
        previewTimer = null;
    }
    document.getElementById('barcodeInput').value = '';
    document.getElementById('transferDistributor').value = '';
    document.getElementById('transferType').value = '移出';
    document.getElementById('transferRemark').value = '';
    sessionStorage.removeItem(`transfer_page_input_${currentTransferSlot}`);
    sessionStorage.removeItem(`transfer_page_distributor_${currentTransferSlot}`);
    sessionStorage.removeItem(`transfer_page_type_${currentTransferSlot}`);
    sessionStorage.removeItem(`transfer_page_remark_${currentTransferSlot}`);
    sessionStorage.removeItem(`crm_summary_job_id_${currentTransferSlot}`);
    currentSummaryJobId = '';
    resetTransferActionUi();
    lastRenderedLogKey = '';
}

function renderSummary(summary) {
    const box = document.getElementById('summaryBox');
    mergeDistributorHistory((summary.details || []).flatMap(row => [row.current_dealer, row.service_dealer]));
    const totalQty = (summary.groups || []).reduce((sum, row) => sum + Number(row.quantity || 0), 0);
    const rows = (summary.groups || []).map(row => `
        <tr><td>${escapeHtml(row.product_name)}</td><td>${escapeHtml(row.product_code)}</td><td>${row.quantity || 0}</td><td>${(row.barcodes || []).map(escapeHtml).join('<br>')}</td></tr>
    `).join('');
    const details = (summary.details || []).map(row => `
        <tr><td>${escapeHtml(row.barcode)}</td><td>${escapeHtml(row.product_name || '')}</td><td>${escapeHtml(row.product_code || '')}</td><td>${escapeHtml(row.current_dealer || '未查询，按条码匹配')}</td><td><span class="pill">${escapeHtml(row.source === 'product_library' ? '条码匹配' : row.source === 'query_result' ? '查询结果' : '未匹配')}</span></td></tr>
    `).join('');
    const blockedRows = (summary.blocked || []).map(row => `<tr><td>${escapeHtml(row.barcode)}</td><td>${escapeHtml(row.reason)}</td></tr>`).join('');
    const missingRows = (summary.missing || []).map(bc => `<tr><td>${escapeHtml(bc)}</td><td>条码匹配未匹配，请先添加前缀规则或查询一次该产品条码</td></tr>`).join('');
    const excludedRows = (summary.excluded || []).map(bc => {
        const reason = (summary.excluded_unmatched || []).includes(bc) ? '在线查询后仍无产品信息，已临时排除' : '拆机条码，已排除';
        return `<tr><td>${escapeHtml(bc)}</td><td>${escapeHtml(reason)}</td></tr>`;
    }).join('');
    box.innerHTML = `
        <table><thead><tr><th>产品名称</th><th>产品编码</th><th>数量</th><th>条码</th></tr></thead><tbody>${rows || '<tr><td colspan="4">无可移库明细</td></tr>'}</tbody></table>
        <div class="note">已选条码 ${summary.total || 0} 个，产品 ${(summary.groups || []).length} 条，数量合计 ${totalQty}。</div>
        <table><thead><tr><th>条码</th><th>产品名称</th><th>产品编码</th><th>当前所属</th><th>来源</th></tr></thead><tbody>${details}</tbody></table>
        ${blockedRows ? `<div class="note blocked">以下条码方向不匹配，仅提示。确认后仍会提交移库。</div><table><thead><tr><th>条码</th><th>提示</th></tr></thead><tbody>${blockedRows}</tbody></table>` : ''}
        ${missingRows ? `<div class="note blocked">以下条码无法识别产品。</div><table><thead><tr><th>条码</th><th>原因</th></tr></thead><tbody>${missingRows}</tbody></table>` : ''}
        ${excludedRows ? `<div class="note blocked">以下条码不会参与本次移库。</div><table><thead><tr><th>条码</th><th>原因</th></tr></thead><tbody>${excludedRows}</tbody></table>` : ''}
    `;
    box.style.display = '';
}

async function ensureCrmLoggedIn(actionText) {
    const data = await fetch('/api/crm/status?kind=transfer&slot_id=' + encodeURIComponent(currentTransferSlot)).then(r => r.json()).catch(() => ({}));
    if (data.logged_in) return true;
    const message = `CRM 未登录，不能${actionText}。请先批量登录 CRM。`;
    appendLog(message, 'error');
    openLoginModal();
    return false;
}

function openLoginModal() {
    const modal = document.getElementById('loginModal');
    modal.classList.add('show');
    document.getElementById('captchaRow').style.display = 'none';
    document.getElementById('captchaSubmitBtn').style.display = 'none';
    document.getElementById('resetLoginBtn').style.display = 'none';
    document.getElementById('modalLoginBtn').style.display = '';
    document.getElementById('modalLoginBtn').disabled = false;
    document.getElementById('modalLoginBtn').textContent = '批量登录';
    document.getElementById('captchaInput').value = '';
    loadSavedCrmCredentials();
    setTimeout(() => document.getElementById('loginUsername').focus(), 50);
}

function closeLoginModal() {
    document.getElementById('loginModal').classList.remove('show');
}

async function cancelLogin() {
    closeLoginModal();
    document.getElementById('captchaRow').style.display = 'none';
    document.getElementById('captchaSubmitBtn').style.display = 'none';
    document.getElementById('resetLoginBtn').style.display = 'none';
    document.getElementById('modalLoginBtn').style.display = '';
    document.getElementById('modalLoginBtn').disabled = false;
    document.getElementById('modalLoginBtn').textContent = '批量登录';
    document.getElementById('captchaSubmitBtn').disabled = false;
    document.getElementById('captchaSubmitBtn').textContent = '提交验证码';
    document.getElementById('captchaInput').value = '';
    try {
        if (currentLoginJobId) {
            await fetch('/api/crm/bulk-login/cancel', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({scope: 'transfer', job_id: currentLoginJobId})
            }).catch(() => {});
        }
    } catch (e) {}
    pendingLoginSlots = [];
    currentLoginJobId = '';
    sessionStorage.removeItem('crm_bulk_login_job_transfer');
    if (loginPollTimer) clearInterval(loginPollTimer);
    loginPollTimer = null;
    refreshCrmStatus();
}

function appendLoginServerLog(entry) {
    if (!entry || Number(entry.id || 0) <= lastLoginLogSeq) return;
    appendLog(entry.message || '', entry.level || 'dim');
    lastLoginLogSeq = Math.max(lastLoginLogSeq, Number(entry.id || 0));
}

function renderBulkLoginStatus(data) {
    if (!data || !data.success) return;
    currentLoginJobId = data.job_id || currentLoginJobId;
    if (currentLoginJobId) sessionStorage.setItem('crm_bulk_login_job_transfer', currentLoginJobId);
    (data.logs || []).forEach(appendLoginServerLog);
    pendingLoginSlots = data.pending_slots || [];
    const loginBtn = document.getElementById('modalLoginBtn');
    if (data.running || data.waiting_captcha) {
        document.getElementById('loginModal').classList.add('show');
        loginBtn.disabled = true;
        loginBtn.textContent = data.waiting_captcha ? '等待验证码' : '登录中...';
    }
    if (data.waiting_captcha) {
        document.getElementById('captchaRow').style.display = '';
        loginBtn.style.display = 'none';
        document.getElementById('captchaSubmitBtn').style.display = '';
        document.getElementById('resetLoginBtn').style.display = '';
        document.getElementById('loginPassword').value = '';
        if (!data.captcha_received) {
            document.getElementById('captchaSubmitBtn').disabled = false;
            document.getElementById('captchaSubmitBtn').textContent = '提交验证码';
        }
        const captchaInput = document.getElementById('captchaInput');
        if (!captchaInput.value) captchaInput.focus();
    }
    if (data.captcha_received && data.running) {
        document.getElementById('captchaSubmitBtn').disabled = true;
        document.getElementById('captchaSubmitBtn').textContent = '验证码已提交';
    }
    if (data.done) {
        if (loginPollTimer) clearInterval(loginPollTimer);
        loginPollTimer = null;
        loginBtn.disabled = false;
        loginBtn.textContent = '批量登录';
        document.getElementById('captchaSubmitBtn').disabled = false;
        document.getElementById('captchaSubmitBtn').textContent = '提交验证码';
        if (data.login_success) {
            appendLog('批量登录成功', 'success');
            closeLoginModal();
            document.getElementById('captchaRow').style.display = 'none';
            document.getElementById('resetLoginBtn').style.display = 'none';
            document.getElementById('captchaInput').value = '';
            currentLoginJobId = '';
            sessionStorage.removeItem('crm_bulk_login_job_transfer');
        } else if (!data.waiting_captcha) {
            appendLog(data.error || '部分移库通道未登录', 'warn');
            document.getElementById('resetLoginBtn').style.display = '';
        }
        refreshCrmStatus();
    }
}

async function pollBulkLoginStatus() {
    if (!currentLoginJobId) return;
    const params = new URLSearchParams({scope: 'transfer', job_id: currentLoginJobId});
    const data = await fetch('/api/crm/bulk-login/status?' + params.toString()).then(r => r.json()).catch(() => null);
    if (data && data.success) renderBulkLoginStatus(data);
}

function startBulkLoginPolling() {
    if (loginPollTimer) clearInterval(loginPollTimer);
    loginPollTimer = setInterval(pollBulkLoginStatus, 1000);
    pollBulkLoginStatus();
}

async function doLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!username || !password) {
        appendLog('请输入 CRM 账号密码', 'warn');
        return;
    }
    const btn = document.getElementById('modalLoginBtn');
    btn.disabled = true;
    btn.textContent = '登录中...';
    appendLog('开始批量登录移库通道...', 'info');
    pendingLoginSlots = [];
    lastLoginLogSeq = 0;
    try {
        saveCrmCredentials(username, password);
        const r = await fetch('/api/crm/bulk-login/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({scope: 'transfer', username, password})
        });
        const data = await r.json();
        if (!data.success) {
            appendLog(data.error || '批量登录启动失败', 'error');
            btn.disabled = false;
            btn.textContent = '批量登录';
            return;
        }
        renderBulkLoginStatus(data);
        startBulkLoginPolling();
    } catch (e) {
        appendLog('登录出错：' + e, 'error');
        btn.disabled = false;
        btn.textContent = '批量登录';
    }
    refreshCrmStatus();
}

async function doLoginStep2() {
    const captcha = document.getElementById('captchaInput').value.trim();
    if (!captcha) {
        appendLog('请输入验证码', 'warn');
        return;
    }
    const btn = document.getElementById('captchaSubmitBtn');
    btn.disabled = true;
    btn.textContent = '提交中...';
    appendLog('提交验证码到等待中的移库通道...', 'info');
    try {
        const r = await fetch('/api/crm/bulk-login/captcha', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({scope: 'transfer', job_id: currentLoginJobId, captcha})
        });
        const data = await r.json();
        if (!data.success) {
            appendLog(data.error || '提交验证码失败', 'error');
        } else {
            renderBulkLoginStatus(data);
            startBulkLoginPolling();
        }
    } catch (e) {
        appendLog('提交验证码出错：' + e, 'error');
    }
    btn.disabled = false;
    btn.textContent = '提交验证码';
    refreshCrmStatus();
}

async function restartLogin() {
    appendLog('重新打开 CRM 登录...', 'warn');
    try {
        if (currentLoginJobId) {
            await fetch('/api/crm/bulk-login/cancel', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({scope: 'transfer', job_id: currentLoginJobId})
            }).catch(() => {});
        }
    } catch (e) {}
    pendingLoginSlots = [];
    currentLoginJobId = '';
    sessionStorage.removeItem('crm_bulk_login_job_transfer');
    document.getElementById('captchaRow').style.display = 'none';
    document.getElementById('captchaSubmitBtn').style.display = 'none';
    document.getElementById('resetLoginBtn').style.display = 'none';
    document.getElementById('modalLoginBtn').style.display = '';

async function doLogout() {
    appendLog('正在退出所有移库通道...', 'warn');
    try {
        await loadSlots();
        const slots = transferSlots.length ? transferSlots : [{id: currentTransferSlot}];
        await Promise.all(slots.map(slot => fetch('/api/crm/logout?kind=transfer&slot_id=' + encodeURIComponent(slot.id), {method:'POST'}).catch(() => {})));
        appendLog('所有移库通道已退出登录', 'warn');
    } catch (e) {
        appendLog('退出 CRM 出错：' + e, 'error');
    }
    closeLoginModal();
    refreshCrmStatus();
}

async function previewTransfer() {
    const slotId = currentTransferSlot;
    const barcodes = parseBarcodes();
    if (!barcodes.length) return alert('请输入条码');
    if (!await ensureCrmLoggedIn('汇总预览')) return;
    if (slotId !== currentTransferSlot) return;
    const previewBtn = document.getElementById('previewBtn');
    const submitBtn = document.getElementById('submitBtn');
    previewBtn.disabled = true;
    previewBtn.textContent = '汇总中...';
    submitBtn.disabled = true;
    lastSummary = null;
    if (previewTimer) clearInterval(previewTimer);
    appendLog('开始汇总预览，缺少条码匹配前缀时会自动查询代表条码...', 'info');
    let data = null;
    try {
        const payload = JSON.stringify(transferPayloadForSlot(slotId, {
            barcodes,
            transfer_type: document.getElementById('transferType').value,
            distributor: document.getElementById('transferDistributor').value.trim()
        }));
        const res = await fetch('/api/transfer/summary/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            keepalive: payload.length < 60000,
            body: payload
        });
        data = await res.json();
    } catch (e) {
        if (slotId === currentTransferSlot) {
            appendLog('启动汇总请求被中断，正在检查后台任务状态...', 'warn');
            startSummaryPolling(slotId, sessionStorage.getItem(`crm_summary_job_id_${slotId}`) || '');
        }
        return;
    }
    if (!data.success) {
        if (slotId === currentTransferSlot) {
            appendLog(data.error || '预览失败', 'error');
            previewBtn.disabled = false;
            previewBtn.textContent = '汇总预览';
        }
        return;
    }
    const jobId = data.job_id || '';
    if (jobId) sessionStorage.setItem(`crm_summary_job_id_${slotId}`, jobId);
    if (slotId !== currentTransferSlot) return;
    currentSummaryJobId = jobId;
    startSummaryPolling(slotId, jobId);
}

function startSummaryPolling(slotId=currentTransferSlot, jobId=currentSummaryJobId) {
    if (previewTimer) clearInterval(previewTimer);
    previewTimer = setInterval(() => pollSummaryStatus(slotId, jobId), 1000);
    pollSummaryStatus(slotId, jobId);
}

async function pollSummaryStatus(slotId=currentTransferSlot, jobId=currentSummaryJobId) {
    const params = new URLSearchParams({slot_id: slotId, job_id: jobId || ''});
    const data = await fetch('/api/transfer/summary/status?' + params.toString()).then(res => res.json());
    if (data.job_id) sessionStorage.setItem(`crm_summary_job_id_${slotId}`, data.job_id);
    if (slotId !== currentTransferSlot) return;
    if (data.job_id) currentSummaryJobId = data.job_id;
    renderLogs(data.logs || [], data, '汇总已耗时', '汇总总耗时');
    if (data.summary) renderSummary(data.summary);
    if (!data.done) return;

    clearInterval(previewTimer);
    previewTimer = null;
    const previewBtn = document.getElementById('previewBtn');
    previewBtn.disabled = false;
    previewBtn.textContent = '汇总预览';

    lastSummary = data.summary_success ? data.summary : null;
    document.getElementById('submitBtn').disabled = !data.summary_success;
    if (!data.summary_success && data.error) {
        appendLog(data.error, 'error');
    }
}

async function submitTransfer() {
    const slotId = currentTransferSlot;
    if (!lastSummary) return alert('请先汇总预览');
    const distributor = document.getElementById('transferDistributor').value.trim();
    if (!distributor) return alert('请输入目标分销商');
    if (!await ensureCrmLoggedIn('提交移库')) return;
    if (slotId !== currentTransferSlot) return;
    document.getElementById('submitBtn').disabled = true;
    appendLog('提交移库任务...', 'info');
    const res = await fetch('/api/crm/transfer', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(transferPayloadForSlot(slotId, {
            barcodes: parseBarcodes(),
            distributor,
            transfer_type: document.getElementById('transferType').value,
            remark: document.getElementById('transferRemark').value.trim()
        }))
    });
    const data = await res.json();
    if (!data.success) {
        if (slotId === currentTransferSlot) {
            appendLog(data.error || '提交失败', 'error');
            document.getElementById('submitBtn').disabled = false;
        }
        return;
    }
    const jobId = data.job_id || '';
    if (jobId) sessionStorage.setItem(`crm_transfer_job_id_${slotId}`, jobId);
    submittedTransferDistributor = distributor;
    if (slotId !== currentTransferSlot) return;
    currentTransferJobId = jobId;
    startTransferPolling(slotId, jobId);
}

function appendLog(message, level='dim') {
    const box = document.getElementById('transferLog');
    if (box.innerText.includes('等待操作')) box.innerHTML = '';
    const line = document.createElement('div');
    line.className = level;
    line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
    box.appendChild(line);
    lastRenderedLogKey = '';
    box.scrollTop = box.scrollHeight;
    if (window.globalLogAppend) window.globalLogAppend(message, level);
}

function renderLogs(logs, jobData=null, runningLabel='已耗时', doneLabel='总耗时') {
    const box = document.getElementById('transferLog');
    if ((!logs || !logs.length) && !jobData) return;
    const durationLine = jobDurationLine(jobData, runningLabel, doneLabel);
    const key = JSON.stringify({logs: logs || [], durationLine});
    if (key === lastRenderedLogKey) return;
    lastRenderedLogKey = key;
    box.innerHTML = (logs || []).map(row => `<div class="${escapeHtml(row.level || 'dim')}">[${escapeHtml(row.time || '')}] ${escapeHtml(row.message || '')}</div>`).join('') + durationLine;
    box.scrollTop = box.scrollHeight;
    if (logs && logs.length && window.globalLogReplaceRows) window.globalLogReplaceRows(logs);
}

function startTransferPolling(slotId=currentTransferSlot, jobId=currentTransferJobId) {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(() => pollStatus(slotId, jobId), 1200);
    pollStatus(slotId, jobId);
}

async function pollStatus(slotId=currentTransferSlot, jobId=currentTransferJobId) {
    const params = new URLSearchParams({slot_id: slotId, job_id: jobId || ''});
    const res = await fetch('/api/crm/transfer/status?' + params.toString());
    const data = await res.json();
    if (data.job_id) sessionStorage.setItem(`crm_transfer_job_id_${slotId}`, data.job_id);
    if (slotId !== currentTransferSlot) return;
    if (data.job_id) currentTransferJobId = data.job_id;
    renderLogs(data.logs || [], data, '移库已耗时', '移库总耗时');
    if (data.summary) renderSummary(data.summary);
    if (data.done) {
        clearInterval(pollTimer);
        pollTimer = null;
        if (data.transfer_success) {
            saveDistributorHistory((data.transfer && data.transfer.distributor) || submittedTransferDistributor);
            submittedTransferDistributor = '';
        }
        document.getElementById('submitBtn').disabled = false;
    }
}

async function restoreTransferStatus() {
    const slotId = currentTransferSlot;
    const params = new URLSearchParams({slot_id: slotId, job_id: currentTransferJobId || ''});
    const data = await fetch('/api/crm/transfer/status?' + params.toString()).then(res => res.json()).catch(() => null);
    if (!data || (!data.running && !data.done && !(data.logs || []).length && !data.summary)) return false;
    if (slotId !== currentTransferSlot) return false;
    if (data.job_id) {
        currentTransferJobId = data.job_id;
        sessionStorage.setItem(`crm_transfer_job_id_${slotId}`, data.job_id);
    }

    renderLogs(data.logs || [], data, '移库已耗时', '移库总耗时');
    if (data.summary) {
        renderSummary(data.summary);
        lastSummary = data.summary;
    }

    const submitBtn = document.getElementById('submitBtn');
    if (data.running) {
        submitBtn.disabled = true;
        if (!pollTimer) {
            startTransferPolling(slotId, currentTransferJobId);
        }
        return true;
    }

    if (data.done) {
        if (pollTimer) {
            clearInterval(pollTimer);
            pollTimer = null;
        }
        if (data.transfer_success) {
            saveDistributorHistory((data.transfer && data.transfer.distributor) || submittedTransferDistributor);
            submittedTransferDistributor = '';
        }
        submitBtn.disabled = !lastSummary;
        return true;
    }

    return Boolean((data.logs || []).length || data.summary);
}

async function restoreSummaryStatus() {
    const slotId = currentTransferSlot;
    const params = new URLSearchParams({slot_id: slotId, job_id: currentSummaryJobId || ''});
    const data = await fetch('/api/transfer/summary/status?' + params.toString()).then(res => res.json()).catch(() => null);
    if (!data || (!data.running && !data.done && !(data.logs || []).length)) return false;
    if (slotId !== currentTransferSlot) return false;
    if (data.job_id) {
        currentSummaryJobId = data.job_id;
        sessionStorage.setItem(`crm_summary_job_id_${slotId}`, data.job_id);
    }

    renderLogs(data.logs || [], data, '汇总已耗时', '汇总总耗时');
    if (data.summary) renderSummary(data.summary);

    const previewBtn = document.getElementById('previewBtn');
    const submitBtn = document.getElementById('submitBtn');

    if (data.running) {
        previewBtn.disabled = true;
        previewBtn.textContent = '汇总中...';
        submitBtn.disabled = true;
        startSummaryPolling(slotId, currentSummaryJobId);
        return true;
    }

    previewBtn.disabled = false;
    previewBtn.textContent = '汇总预览';
    lastSummary = data.summary_success ? data.summary : null;
    submitBtn.disabled = !data.summary_success;
    return Boolean((data.logs || []).length || data.summary);
}

async function resumeBackgroundJobs() {
    await restoreSummaryStatus();
    await restoreTransferStatus();
}

async function loadLibrary() {

            <thead><tr><th>前缀</th><th>产品编码</th><th>产品名称</th><th>更新</th><th></th></tr></thead>
            <tbody>${rows.map(row => `
                <tr>

async function saveLibrary() {

        prefix: document.getElementById('libPrefix').value.trim(),
        product_code: document.getElementById('libCode').value.trim(),
        product_name: document.getElementById('libName').value.trim()
    };

}

function loadIncomingBarcodes() {
    let barcodes = [];
    const params = new URLSearchParams(location.search);
    const queryBarcodes = params.get('barcodes');
    if (queryBarcodes) {
        barcodes = queryBarcodes.split(/[\s,，;；]+/).map(x => x.trim()).filter(Boolean);
    }
    if (!barcodes.length) {
        try {
            if (sessionStorage.getItem('transferBarcodesSource') === 'results') {
                barcodes = JSON.parse(sessionStorage.getItem('transferBarcodes') || '[]');
            }
            sessionStorage.removeItem('transferBarcodes');
            sessionStorage.removeItem('transferBarcodesSource');
        } catch(e) {
            barcodes = [];
        }
    }
    if (barcodes.length) {
        document.getElementById('barcodeInput').value = Array.from(new Set(barcodes)).join('\n');
        saveTransferInput();
        appendLog(`已从结果管理带入 ${barcodes.length} 个条码`, 'info');
    }
    const distributor = sessionStorage.getItem('transferDistributor') || '';
    if (distributor) {
        document.getElementById('transferDistributor').value = distributor;
        sessionStorage.removeItem('transferDistributor');
        saveTransferInput();
        appendLog(`已自动填入目标分销商：${distributor}`, 'info');
    }
    const transferType = sessionStorage.getItem('transferType') || '';
    if (transferType) {
        document.getElementById('transferType').value = transferType;
        sessionStorage.removeItem('transferType');
        saveTransferInput();
        appendLog(`已自动选择移库类型：${transferType}`, 'info');
    }
}

async function refreshCrmStatus() {
    await loadSlots();
    const data = await fetch('/api/crm/status?kind=transfer&slot_id=' + encodeURIComponent(currentTransferSlot)).then(r => r.json()).catch(() => ({}));
    const dot = document.getElementById('loginDot');
    const text = document.getElementById('loginStatus');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const totalSlots = transferSlots.length || 1;
    const loggedSlots = transferSlots.filter(slot => slot.logged_in).length;
    dot.className = 'dot ' + (data.logged_in ? 'green' : 'red');
    text.textContent = data.logged_in ? `已登录 ${loggedSlots}/${totalSlots}` : `未登录 ${loggedSlots}/${totalSlots}`;
    loginBtn.style.display = loggedSlots < totalSlots ? '' : 'none';
    if (logoutBtn) logoutBtn.style.display = loggedSlots > 0 ? '' : 'none';
    const appAccountStatus = document.getElementById('appAccountStatus');
    if (appAccountStatus) {
        const appData = await fetch('/api/app-auth/status').then(r => r.json()).catch(() => ({}));
        appAccountStatus.textContent = appData.account ? appData.account.username : '未登录';
    }
}

async function loadQueriedDealerHistory() {
    const data = await fetch('/api/distributor-history').then(r => r.json()).catch(() => null);
    if (data && data.success) {
        mergeDistributorHistory(data.dealers || []);
    }
}

(async function initPage() {
    await loadSlots();
    const targetSlot = sessionStorage.getItem('transferTargetSlot') || '';
    if (targetSlot && transferSlots.some(slot => slot.id === targetSlot)) {
        currentTransferSlot = targetSlot;
        localStorage.setItem('crm_transfer_slot', currentTransferSlot);
        currentSummaryJobId = sessionStorage.getItem(`crm_summary_job_id_${currentTransferSlot}`) || '';
        currentTransferJobId = sessionStorage.getItem(`crm_transfer_job_id_${currentTransferSlot}`) || '';
        renderTransferSlots();
    }
    sessionStorage.removeItem('transferTargetSlot');
    renderDistributorHistory();
    restoreTransferInput();
    loadIncomingBarcodes();
    loadQueriedDealerHistory();
    refreshCrmStatus();
    resumeBackgroundJobs();
    if (currentLoginJobId) {
        startBulkLoginPolling();
    }
})();

document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
        resumeBackgroundJobs();
    }
});

window.addEventListener('pageshow', () => {
    resumeBackgroundJobs();
});
</script>
</body>
