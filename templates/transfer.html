<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM 移库</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7fb; color: #202938; min-height: 100vh; }
        .container { max-width: 1280px; margin: 0 auto; padding: 24px; }
        .header { display:flex; justify-content:space-between; gap:16px; align-items:flex-end; margin-bottom:20px; }
        h1 { font-size:26px; margin-bottom:6px; }
        .muted { color:#667085; font-size:13px; }
        .page-nav { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
        .page-nav a { font-size:13px; font-weight:800; color:#667085; text-decoration:none; padding:8px 14px; border:1px solid #d9e1ec; border-radius:999px; background:#fff; }
        .page-nav a.active { background:#2563eb; color:#fff; border-color:#2563eb; }
        .status-bar { display:flex; align-items:center; justify-content:space-between; gap:12px; background:#fff; border:1px solid #d9e1ec; border-radius:8px; padding:12px 14px; margin-bottom:16px; box-shadow:0 6px 18px rgba(15,23,42,.05); }
        .status-text { font-size:13px; font-weight:800; color:#334155; }
        .status-text .dot { display:inline-block; width:9px; height:9px; border-radius:50%; background:#94a3b8; margin-right:6px; }
        .status-text .dot.green { background:#16a34a; }
        .status-text .dot.red { background:#dc2626; }
        .grid { display:grid; grid-template-columns: 1fr; gap:16px; align-items:start; }
        .card { background:#fff; border:1px solid #d9e1ec; border-radius:8px; padding:18px; box-shadow:0 8px 24px rgba(15,23,42,.06); margin-bottom:16px; }
        .card h2 { font-size:16px; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid #e5e7eb; }
        label { display:block; font-size:12px; color:#667085; font-weight:700; margin-bottom:6px; }
        textarea, input, select { width:100%; border:1px solid #cfd8e3; border-radius:6px; padding:9px 10px; font-size:14px; outline:none; background:#fff; }
        textarea { min-height:150px; font-family:"Courier New", monospace; resize:vertical; }
        textarea:focus, input:focus, select:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.12); }
        .fields { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:12px; margin:12px 0; }
        .actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; margin-top:12px; }
        .btn { min-height:38px; padding:8px 16px; border:none; border-radius:8px; font-weight:800; cursor:pointer; }
        .btn-primary { background:#2563eb; color:#fff; }
        .btn-transfer { background:#0f766e; color:#fff; }
        .btn-secondary { background:#e5e7eb; color:#334155; }
        .btn-danger { background:#dc2626; color:#fff; }
        .btn:disabled { background:#cbd5e1; cursor:not-allowed; }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(15,23,42,.45); z-index:1000; align-items:center; justify-content:center; padding:18px; }
        .modal-overlay.show { display:flex; }
        .login-modal { width:min(520px, 100%); background:#fff; border-radius:8px; box-shadow:0 24px 72px rgba(15,23,42,.28); overflow:hidden; }
        .login-modal-head { display:flex; justify-content:space-between; align-items:center; padding:14px 18px; border-bottom:1px solid #e5e7eb; }
        .login-modal-head h3 { font-size:17px; }
        .modal-close { border:none; background:transparent; font-size:24px; color:#94a3b8; cursor:pointer; }
        .login-modal-body { padding:18px; }
        .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; flex-wrap:wrap; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th, td { border-bottom:1px solid #e5e7eb; padding:8px 10px; text-align:left; vertical-align:top; }
        th { background:#f8fafc; color:#475569; }
        .summary { border:1px solid #d9e1ec; border-radius:8px; overflow:hidden; margin-top:12px; display:none; }
        .note { background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; color:#475569; font-size:12px; line-height:1.6; padding:10px 12px; margin-top:10px; }
        .blocked { background:#fff1f2; border-color:#fecaca; color:#991b1b; }
        .log { background:#0f172a; color:#d4d4d4; border-radius:8px; padding:12px; font-family:"Courier New", monospace; font-size:12px; max-height:260px; overflow:auto; line-height:1.7; }
        .log .info { color:#4fc3f7; } .log .success { color:#81c784; } .log .error { color:#e57373; } .log .warn { color:#ffb74d; } .log .dim { color:#94a3b8; }
        .pill { display:inline-block; padding:2px 7px; border-radius:999px; background:#e0f2fe; color:#0369a1; font-size:12px; font-weight:700; }
        .distributor-picker { position:relative; }
        .distributor-dropdown { display:none; position:absolute; z-index:30; top:calc(100% + 4px); left:0; right:0; max-height:220px; overflow:auto; background:#fff; border:1px solid #cfd8e3; border-radius:6px; box-shadow:0 14px 32px rgba(15,23,42,.14); }
        .distributor-dropdown.open { display:block; }
        .distributor-option { padding:9px 10px; font-size:14px; cursor:pointer; border-bottom:1px solid #eef2f7; }
        .distributor-option:last-child { border-bottom:none; }
        .distributor-option:hover, .distributor-option.active { background:#eef4ff; color:#1d4ed8; }
        .distributor-empty { padding:9px 10px; font-size:13px; color:#94a3b8; }
        @media (max-width: 860px) { .grid, .fields { grid-template-columns:1fr; } .header { flex-direction:column; align-items:flex-start; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>CRM 移库</h1>
            <p class="muted">直接粘贴条码即可移库。未查询条码会按条码匹配前缀匹配产品名称和编码。</p>
        </div>
        <div class="page-nav">
            {% for link in nav_links %}
            <a href="{{ link.href }}" class="{{ 'active' if link.href == '/transfer' else '' }}">{{ link.label }}</a>
            {% endfor %}
        </div>
    </div>

    <div class="status-bar">
        <div class="status-text"><span class="dot" id="loginDot"></span>CRM 登录状态：<span id="loginStatus">检测中</span></div>
        <div class="status-text">工具账号：<span id="appAccountStatus">检测中</span> <a href="/logout">退出</a></div>
        <button class="btn btn-primary" id="loginBtn" onclick="openLoginModal()">登录 CRM</button>
    </div>

    <div class="grid">
        <div>
            <div class="card">
                <h2>提交移库</h2>
                <label>条码列表</label>
                <textarea id="barcodeInput" placeholder="每行一个条码，也可以用逗号、空格混合分隔" inputmode="latin" lang="en" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="ime-mode:inactive"></textarea>
                <div class="fields">
                    <div>
                        <label>移库类型</label>
                        <select id="transferType">
                            <option value="移出">移出</option>
                            <option value="移入">移入</option>
                        </select>
                    </div>
                    <div>
                        <label>目标分销商</label>
                        <div class="distributor-picker">
                            <input id="transferDistributor" placeholder="输入分销商名称" autocomplete="off" onfocus="showDistributorDropdown()" oninput="showDistributorDropdown()" onkeydown="handleDistributorKeydown(event)" onblur="hideDistributorDropdownSoon()">
                            <div id="distributorHistoryDropdown" class="distributor-dropdown"></div>
                        </div>
                    </div>
                    <div>
                        <label>备注</label>
                        <input id="transferRemark" placeholder="可选">
                    </div>
                </div>
                <div class="actions">
                    <button class="btn btn-secondary" onclick="clearForm()">清空</button>
                    <button class="btn btn-primary" id="previewBtn" onclick="previewTransfer()">汇总预览</button>
                    <button class="btn btn-transfer" id="submitBtn" onclick="submitTransfer()" disabled>提交移库</button>
                </div>
                <div class="summary" id="summaryBox"></div>
            </div>

            <div class="card">
                <h2>移库日志</h2>
                <div class="log" id="transferLog"><div class="dim">等待操作...</div></div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="loginModal" onclick="if(event.target.id==='loginModal')cancelLogin()">
    <div class="login-modal">
        <div class="login-modal-head">
            <h3>登录 CRM</h3>
            <button class="modal-close" onclick="cancelLogin()">×</button>
        </div>
        <div class="login-modal-body">
            <div class="fields">
                <div>
                    <label>账号</label>
                    <input type="text" id="loginUsername" placeholder="CRM 用户名">
                </div>
                <div>
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="密码">
                </div>
            </div>
            <div id="captchaRow" style="display:none;margin-top:12px;">
                <label>短信验证码</label>
                <input type="text" id="captchaInput" placeholder="输入收到短信验证码" maxlength="6">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="cancelLogin()">取消</button>
                <button class="btn btn-primary" id="modalLoginBtn" onclick="doLogin()">登录</button>
                <button class="btn btn-primary" id="captchaSubmitBtn" onclick="doLoginStep2()" style="display:none">提交验证码</button>
                <button class="btn btn-secondary" id="resetLoginBtn" onclick="restartLogin()" style="display:none">重新登录</button>
            </div>
        </div>
    </div>
</div>

<script>
let lastSummary = null;
let pollTimer = null;
let previewTimer = null;
let lastRenderedLogKey = '';
let highlightedDistributorIndex = -1;
let submittedTransferDistributor = '';
const OWN_DEALER_NAME = '江西省天麓工贸有限公司';

function escapeHtml(text) {
    return String(text || '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

function parseBarcodes() {
    return Array.from(new Set(document.getElementById('barcodeInput').value
        .split(/[\s,，;；]+/)
        .map(x => x.trim())
        .filter(Boolean)));
}

function loadDistributorHistory() {
    try {
        return JSON.parse(localStorage.getItem('transferDistributorHistory') || '[]')
            .map(x => String(x || '').trim())
            .filter(Boolean);
    } catch (e) {
        return [];
    }
}

function saveDistributorHistory(value) {
    const name = String(value || '').trim();
    if (!name || name === OWN_DEALER_NAME) return;
    const rows = [name, ...loadDistributorHistory().filter(x => x !== name)].slice(0, 30);
    localStorage.setItem('transferDistributorHistory', JSON.stringify(rows));
    fetch('/api/distributor-history', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({distributor: name})
    }).catch(() => {});
    renderDistributorHistory();
}

function mergeDistributorHistory(values) {
    const incoming = Array.from(new Set((values || [])
        .map(x => String(x || '').trim())
        .filter(x => x && x !== OWN_DEALER_NAME)));
    if (!incoming.length) return;
    const rows = [...incoming, ...loadDistributorHistory().filter(x => !incoming.includes(x))].slice(0, 30);
    localStorage.setItem('transferDistributorHistory', JSON.stringify(rows));
    renderDistributorHistory();
}

function filteredDistributorHistory() {
    const input = document.getElementById('transferDistributor');
    const keyword = (input ? input.value : '').trim().toLowerCase();
    const rows = loadDistributorHistory();
    if (!keyword) return rows;
    return rows.filter(name => name.toLowerCase().includes(keyword));
}

function renderDistributorHistory(open = false) {
    const input = document.getElementById('transferDistributor');
    const dropdown = document.getElementById('distributorHistoryDropdown');
    if (!dropdown) return;
    const rows = filteredDistributorHistory();
    if (highlightedDistributorIndex >= rows.length) highlightedDistributorIndex = rows.length ? rows.length - 1 : -1;
    dropdown.innerHTML = rows.length
        ? rows.map((name, index) => `<div class="distributor-option ${index === highlightedDistributorIndex ? 'active' : ''}" data-name="${escapeHtml(name)}" onmousedown="selectDistributorHistory(this.dataset.name)">${escapeHtml(name)}</div>`).join('')
        : '<div class="distributor-empty">没有匹配的历史分销商</div>';
    dropdown.classList.toggle('open', Boolean(open || document.activeElement === input));
}

function showDistributorDropdown() {
    highlightedDistributorIndex = -1;
    renderDistributorHistory(true);
}

function hideDistributorDropdownSoon() {
    setTimeout(() => {
        const dropdown = document.getElementById('distributorHistoryDropdown');
        if (dropdown) dropdown.classList.remove('open');
    }, 120);
}

function selectDistributorHistory(name) {
    document.getElementById('transferDistributor').value = name;
    saveDistributorHistory(name);
    const dropdown = document.getElementById('distributorHistoryDropdown');
    if (dropdown) dropdown.classList.remove('open');
}

function handleDistributorKeydown(event) {
    const rows = filteredDistributorHistory();
    if (!rows.length || !['ArrowDown', 'ArrowUp', 'Enter', 'Escape'].includes(event.key)) return;
    if (event.key === 'Escape') {
        const dropdown = document.getElementById('distributorHistoryDropdown');
        if (dropdown) dropdown.classList.remove('open');
        return;
    }
    event.preventDefault();
    if (event.key === 'ArrowDown') highlightedDistributorIndex = Math.min(highlightedDistributorIndex + 1, rows.length - 1);
    if (event.key === 'ArrowUp') highlightedDistributorIndex = Math.max(highlightedDistributorIndex - 1, 0);
    if (event.key === 'Enter' && highlightedDistributorIndex >= 0) {
        selectDistributorHistory(rows[highlightedDistributorIndex]);
        return;
    }
    renderDistributorHistory(true);
}

function clearForm() {
    if (previewTimer) {
        clearInterval(previewTimer);
        previewTimer = null;
    }
    document.getElementById('barcodeInput').value = '';
    document.getElementById('summaryBox').style.display = 'none';
    document.getElementById('summaryBox').innerHTML = '';
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('previewBtn').disabled = false;
    document.getElementById('previewBtn').textContent = '汇总预览';
    lastSummary = null;
    lastRenderedLogKey = '';
}

function renderSummary(summary) {
    const box = document.getElementById('summaryBox');
    mergeDistributorHistory((summary.details || []).flatMap(row => [row.current_dealer, row.service_dealer]));
    const totalQty = (summary.groups || []).reduce((sum, row) => sum + Number(row.quantity || 0), 0);
    const rows = (summary.groups || []).map(row => `
        <tr><td>${escapeHtml(row.product_name)}</td><td>${escapeHtml(row.product_code)}</td><td>${row.quantity || 0}</td><td>${(row.barcodes || []).map(escapeHtml).join('<br>')}</td></tr>
    `).join('');
    const details = (summary.details || []).map(row => `
        <tr><td>${escapeHtml(row.barcode)}</td><td>${escapeHtml(row.product_name || '')}</td><td>${escapeHtml(row.product_code || '')}</td><td>${escapeHtml(row.current_dealer || '未查询，按条码匹配')}</td><td><span class="pill">${escapeHtml(row.source === 'product_library' ? '条码匹配' : row.source === 'query_result' ? '查询结果' : '未匹配')}</span></td></tr>
    `).join('');
    const blockedRows = (summary.blocked || []).map(row => `<tr><td>${escapeHtml(row.barcode)}</td><td>${escapeHtml(row.reason)}</td></tr>`).join('');
    const missingRows = (summary.missing || []).map(bc => `<tr><td>${escapeHtml(bc)}</td><td>条码匹配未匹配，请先添加前缀规则或查询一次该产品条码</td></tr>`).join('');
    const excludedRows = (summary.excluded || []).map(bc => {
        const reason = (summary.excluded_unmatched || []).includes(bc) ? '在线查询后仍无产品信息，已临时排除' : '拆机条码，已排除';
        return `<tr><td>${escapeHtml(bc)}</td><td>${escapeHtml(reason)}</td></tr>`;
    }).join('');
    box.innerHTML = `
        <table><thead><tr><th>产品名称</th><th>产品编码</th><th>数量</th><th>条码</th></tr></thead><tbody>${rows || '<tr><td colspan="4">无可移库明细</td></tr>'}</tbody></table>
        <div class="note">已选条码 ${summary.total || 0} 个，产品 ${(summary.groups || []).length} 条，数量合计 ${totalQty}。</div>
        <table><thead><tr><th>条码</th><th>产品名称</th><th>产品编码</th><th>当前所属</th><th>来源</th></tr></thead><tbody>${details}</tbody></table>
        ${blockedRows ? `<div class="note blocked">以下条码方向不匹配，仅提示。确认后仍会提交移库。</div><table><thead><tr><th>条码</th><th>提示</th></tr></thead><tbody>${blockedRows}</tbody></table>` : ''}
        ${missingRows ? `<div class="note blocked">以下条码无法识别产品。</div><table><thead><tr><th>条码</th><th>原因</th></tr></thead><tbody>${missingRows}</tbody></table>` : ''}
        ${excludedRows ? `<div class="note blocked">以下条码不会参与本次移库。</div><table><thead><tr><th>条码</th><th>原因</th></tr></thead><tbody>${excludedRows}</tbody></table>` : ''}
    `;
    box.style.display = '';
}

async function ensureCrmLoggedIn(actionText) {
    const data = await fetch('/api/crm/status').then(r => r.json()).catch(() => ({}));
    if (data.logged_in) return true;
    const message = `CRM 未登录，不能${actionText}。请先登录 CRM。`;
    appendLog(message, 'error');
    openLoginModal();
    return false;
}

function openLoginModal() {
    const modal = document.getElementById('loginModal');
    modal.classList.add('show');
    document.getElementById('captchaRow').style.display = 'none';
    document.getElementById('captchaSubmitBtn').style.display = 'none';
    document.getElementById('resetLoginBtn').style.display = 'none';
    document.getElementById('modalLoginBtn').style.display = '';
    document.getElementById('captchaInput').value = '';
    const savedUsername = localStorage.getItem('crm_username');
    const savedPassword = localStorage.getItem('crm_password');
    if (savedUsername) document.getElementById('loginUsername').value = savedUsername;
    if (savedPassword) document.getElementById('loginPassword').value = savedPassword;
    setTimeout(() => document.getElementById('loginUsername').focus(), 50);
}

function closeLoginModal() {
    document.getElementById('loginModal').classList.remove('show');
}

async function cancelLogin() {
    closeLoginModal();
    document.getElementById('captchaRow').style.display = 'none';
    document.getElementById('captchaSubmitBtn').style.display = 'none';
    document.getElementById('resetLoginBtn').style.display = 'none';
    document.getElementById('modalLoginBtn').style.display = '';
    document.getElementById('modalLoginBtn').disabled = false;
    document.getElementById('modalLoginBtn').textContent = '登录';
    document.getElementById('captchaSubmitBtn').disabled = false;
    document.getElementById('captchaSubmitBtn').textContent = '提交验证码';
    document.getElementById('captchaInput').value = '';
    try {
        await fetch('/api/crm/login/cancel', {method:'POST'});
    } catch (e) {}
    refreshCrmStatus();
}

async function doLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!username || !password) {
        appendLog('请输入 CRM 账号密码', 'warn');
        return;
    }
    const btn = document.getElementById('modalLoginBtn');
    btn.disabled = true;
    btn.textContent = '登录中...';
    appendLog('开始登录 CRM...', 'info');
    try {
        const r = await fetch('/api/crm/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        });
        const d = await r.json();
        if (d.success) {
            localStorage.setItem('crm_username', username);
            localStorage.setItem('crm_password', password);
            if (d.message === 'captcha_required') {
                document.getElementById('captchaRow').style.display = '';
                document.getElementById('modalLoginBtn').style.display = 'none';
                document.getElementById('captchaSubmitBtn').style.display = '';
                document.getElementById('resetLoginBtn').style.display = '';
                document.getElementById('loginPassword').value = '';
                document.getElementById('captchaInput').focus();
                appendLog('验证码已发送到手机，请在弹窗中输入', 'success');
            } else {
                appendLog('CRM 登录成功', 'success');
                closeLoginModal();
            }
        } else {
            appendLog('登录失败：' + (d.message || d.error || '未知错误'), 'error');
        }
    } catch (e) {
        appendLog('登录出错：' + e, 'error');
    }
    btn.disabled = false;
    btn.textContent = '登录';
    refreshCrmStatus();
}

async function doLoginStep2() {
    const captcha = document.getElementById('captchaInput').value.trim();
    if (!captcha) {
        appendLog('请输入验证码', 'warn');
        return;
    }
    const btn = document.getElementById('captchaSubmitBtn');
    btn.disabled = true;
    btn.textContent = '提交中...';
    appendLog('提交验证码...', 'info');
    try {
        const r = await fetch('/api/crm/login-step2', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({captcha})
        });
        const d = await r.json();
        if (d.success) {
            appendLog('CRM 登录成功', 'success');
            closeLoginModal();
            document.getElementById('captchaInput').value = '';
        } else {
            appendLog('验证码错误：' + (d.message || d.error || '请重试'), 'error');
            document.getElementById('resetLoginBtn').style.display = '';
            if ((d.message || '').includes('已重置')) {
                document.getElementById('captchaSubmitBtn').style.display = 'none';
                document.getElementById('modalLoginBtn').style.display = '';
            }
        }
    } catch (e) {
        appendLog('提交验证码出错：' + e, 'error');
    }
    btn.disabled = false;
    btn.textContent = '提交验证码';
    refreshCrmStatus();
}

async function restartLogin() {
    appendLog('重新打开 CRM 登录...', 'warn');
    try {
        await fetch('/api/crm/login/cancel', {method:'POST'});
    } catch (e) {}
    document.getElementById('captchaRow').style.display = 'none';
    document.getElementById('captchaSubmitBtn').style.display = 'none';
    document.getElementById('resetLoginBtn').style.display = 'none';
    document.getElementById('modalLoginBtn').style.display = '';
    document.getElementById('captchaInput').value = '';
    doLogin();
}

async function previewTransfer() {
    const barcodes = parseBarcodes();
    if (!barcodes.length) return alert('请输入条码');
    if (!await ensureCrmLoggedIn('汇总预览')) return;
    const previewBtn = document.getElementById('previewBtn');
    const submitBtn = document.getElementById('submitBtn');
    previewBtn.disabled = true;
    previewBtn.textContent = '汇总中...';
    submitBtn.disabled = true;
    lastSummary = null;
    if (previewTimer) clearInterval(previewTimer);
    appendLog('开始汇总预览，缺少条码匹配前缀时会自动查询代表条码...', 'info');
    let data = null;
    try {
        const payload = JSON.stringify({
            barcodes,
            transfer_type: document.getElementById('transferType').value,
            distributor: document.getElementById('transferDistributor').value.trim()
        });
        const res = await fetch('/api/transfer/summary/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            keepalive: payload.length < 60000,
            body: payload
        });
        data = await res.json();
    } catch (e) {
        appendLog('启动汇总请求被中断，正在检查后台任务状态...', 'warn');
        previewTimer = setInterval(pollSummaryStatus, 1000);
        pollSummaryStatus();
        return;
    }
    if (!data.success) {
        appendLog(data.error || '预览失败', 'error');
        previewBtn.disabled = false;
        previewBtn.textContent = '汇总预览';
        return;
    }
    previewTimer = setInterval(pollSummaryStatus, 1000);
    pollSummaryStatus();
}

async function pollSummaryStatus() {
    const data = await fetch('/api/transfer/summary/status').then(res => res.json());
    renderLogs(data.logs || []);
    if (data.summary) renderSummary(data.summary);
    if (!data.done) return;

    clearInterval(previewTimer);
    previewTimer = null;
    const previewBtn = document.getElementById('previewBtn');
    previewBtn.disabled = false;
    previewBtn.textContent = '汇总预览';

    lastSummary = data.summary_success ? data.summary : null;
    document.getElementById('submitBtn').disabled = !data.summary_success;
    if (!data.summary_success && data.error) {
        appendLog(data.error, 'error');
    }
}

async function submitTransfer() {
    if (!lastSummary) return alert('请先汇总预览');
    const distributor = document.getElementById('transferDistributor').value.trim();
    if (!distributor) return alert('请输入目标分销商');
    if (!await ensureCrmLoggedIn('提交移库')) return;
    document.getElementById('submitBtn').disabled = true;
    appendLog('提交移库任务...', 'info');
    const res = await fetch('/api/crm/transfer', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            barcodes: parseBarcodes(),
            distributor,
            transfer_type: document.getElementById('transferType').value,
            remark: document.getElementById('transferRemark').value.trim()
        })
    });
    const data = await res.json();
    if (!data.success) {
        appendLog(data.error || '提交失败', 'error');
        document.getElementById('submitBtn').disabled = false;
        return;
    }
    submittedTransferDistributor = distributor;
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(pollStatus, 1200);
    pollStatus();
}

function appendLog(message, level='dim') {
    const box = document.getElementById('transferLog');
    if (box.innerText.includes('等待操作')) box.innerHTML = '';
    const line = document.createElement('div');
    line.className = level;
    line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
    box.appendChild(line);
    lastRenderedLogKey = '';
    box.scrollTop = box.scrollHeight;
}

function renderLogs(logs) {
    const box = document.getElementById('transferLog');
    if (!logs || !logs.length) return;
    const key = JSON.stringify(logs);
    if (key === lastRenderedLogKey) return;
    lastRenderedLogKey = key;
    box.innerHTML = logs.map(row => `<div class="${escapeHtml(row.level || 'dim')}">[${escapeHtml(row.time || '')}] ${escapeHtml(row.message || '')}</div>`).join('');
    box.scrollTop = box.scrollHeight;
}

async function pollStatus() {
    const res = await fetch('/api/crm/transfer/status');
    const data = await res.json();
    renderLogs(data.logs || []);
    if (data.summary) renderSummary(data.summary);
    if (data.done) {
        clearInterval(pollTimer);
        pollTimer = null;
        if (data.transfer_success) {
            saveDistributorHistory((data.transfer && data.transfer.distributor) || submittedTransferDistributor);
            submittedTransferDistributor = '';
        }
        document.getElementById('submitBtn').disabled = false;
    }
}

async function restoreTransferStatus() {
    const data = await fetch('/api/crm/transfer/status').then(res => res.json()).catch(() => null);
    if (!data || (!data.running && !data.done && !(data.logs || []).length && !data.summary)) return false;

    renderLogs(data.logs || []);
    if (data.summary) {
        renderSummary(data.summary);
        lastSummary = data.summary;
    }

    const submitBtn = document.getElementById('submitBtn');
    if (data.running) {
        submitBtn.disabled = true;
        if (!pollTimer) {
            pollTimer = setInterval(pollStatus, 1200);
        }
        return true;
    }

    if (data.done) {
        if (pollTimer) {
            clearInterval(pollTimer);
            pollTimer = null;
        }
        if (data.transfer_success) {
            saveDistributorHistory((data.transfer && data.transfer.distributor) || submittedTransferDistributor);
            submittedTransferDistributor = '';
        }
        submitBtn.disabled = !lastSummary;
        return true;
    }

    return Boolean((data.logs || []).length || data.summary);
}

async function restoreSummaryStatus() {
    const data = await fetch('/api/transfer/summary/status').then(res => res.json()).catch(() => null);
    if (!data || (!data.running && !data.done && !(data.logs || []).length)) return false;

    renderLogs(data.logs || []);
    if (data.summary) renderSummary(data.summary);

    const previewBtn = document.getElementById('previewBtn');
    const submitBtn = document.getElementById('submitBtn');

    if (data.running) {
        previewBtn.disabled = true;
        previewBtn.textContent = '汇总中...';
        submitBtn.disabled = true;
        if (previewTimer) clearInterval(previewTimer);
        previewTimer = setInterval(pollSummaryStatus, 1000);
        return true;
    }

    previewBtn.disabled = false;
    previewBtn.textContent = '汇总预览';
    lastSummary = data.summary_success ? data.summary : null;
    submitBtn.disabled = !data.summary_success;
    return Boolean((data.logs || []).length || data.summary);
}

async function resumeBackgroundJobs() {
    await restoreSummaryStatus();
    await restoreTransferStatus();
}

async function loadLibrary() {
    const res = await fetch('/api/product-library');
    const data = await res.json();
    const rows = data.products || [];
    document.getElementById('libraryBox').innerHTML = `
        <table>
            <thead><tr><th>前缀</th><th>产品编码</th><th>产品名称</th><th>更新</th><th></th></tr></thead>
            <tbody>${rows.map(row => `
                <tr>
                    <td>${escapeHtml(row.prefix)}</td>
                    <td>${escapeHtml(row.product_code)}</td>
                    <td>${escapeHtml(row.product_name)}</td>
                    <td>${escapeHtml(row.updated_at || '')}</td>
                    <td><button class="btn btn-danger" onclick="deleteLibrary('${escapeHtml(row.prefix)}')">删除</button></td>
                </tr>
            `).join('') || '<tr><td colspan="5">暂无条码匹配规则</td></tr>'}</tbody>
        </table>`;
}

async function saveLibrary() {
    const payload = {
        prefix: document.getElementById('libPrefix').value.trim(),
        product_code: document.getElementById('libCode').value.trim(),
        product_name: document.getElementById('libName').value.trim()
    };
    const res = await fetch('/api/product-library', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!data.success) return alert(data.error || '保存失败');
    document.getElementById('libPrefix').value = '';
    document.getElementById('libCode').value = '';
    document.getElementById('libName').value = '';
    loadLibrary();
}

async function deleteLibrary(prefix) {
    if (!confirm('确定删除前缀 ' + prefix + ' ？')) return;
    await fetch('/api/product-library/' + encodeURIComponent(prefix), {method: 'DELETE'});
    loadLibrary();
}

function loadIncomingBarcodes() {
    let barcodes = [];
    const params = new URLSearchParams(location.search);
    const queryBarcodes = params.get('barcodes');
    if (queryBarcodes) {
        barcodes = queryBarcodes.split(/[\s,，;；]+/).map(x => x.trim()).filter(Boolean);
    }
    if (!barcodes.length) {
        try {
            barcodes = JSON.parse(sessionStorage.getItem('transferBarcodes') || '[]');
            sessionStorage.removeItem('transferBarcodes');
        } catch(e) {
            barcodes = [];
        }
    }
    if (barcodes.length) {
        document.getElementById('barcodeInput').value = Array.from(new Set(barcodes)).join('\n');
        appendLog(`已从结果管理带入 ${barcodes.length} 个条码`, 'info');
    }
    const distributor = sessionStorage.getItem('transferDistributor') || '';
    if (distributor) {
        document.getElementById('transferDistributor').value = distributor;
        sessionStorage.removeItem('transferDistributor');
        appendLog(`已自动填入目标分销商：${distributor}`, 'info');
    }
    const transferType = sessionStorage.getItem('transferType') || '';
    if (transferType) {
        document.getElementById('transferType').value = transferType;
        sessionStorage.removeItem('transferType');
        appendLog(`已自动选择移库类型：${transferType}`, 'info');
    }
}

async function refreshCrmStatus() {
    const data = await fetch('/api/crm/status').then(r => r.json()).catch(() => ({}));
    const dot = document.getElementById('loginDot');
    const text = document.getElementById('loginStatus');
    const loginBtn = document.getElementById('loginBtn');
    dot.className = 'dot ' + (data.logged_in ? 'green' : 'red');
    text.textContent = data.logged_in ? '已登录' : '未登录';
    loginBtn.style.display = data.logged_in ? 'none' : '';
    const appData = await fetch('/api/app-auth/status').then(r => r.json()).catch(() => ({}));
    document.getElementById('appAccountStatus').textContent = appData.account ? appData.account.username : '未登录';
}

async function loadQueriedDealerHistory() {
    const data = await fetch('/api/distributor-history').then(r => r.json()).catch(() => null);
    if (data && data.success) {
        mergeDistributorHistory(data.dealers || []);
    }
}

(async function initPage() {
    renderDistributorHistory();
    loadIncomingBarcodes();
    loadQueriedDealerHistory();
    refreshCrmStatus();
    resumeBackgroundJobs();
})();

document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
        resumeBackgroundJobs();
    }
});

window.addEventListener('pageshow', () => {
    resumeBackgroundJobs();
});
</script>
</body>
</html>
